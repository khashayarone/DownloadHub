# ============================================================
# soundcloud-dl.yml — Bale SoundCloud Downloader V2
# Repository: ghgithub.com/khashayardev/DownloadHub
# ============================================================
# Features V2:
#   ۱. Cache system — checks repo before downloading (instant skip)
#   ۲. Full playlist & artist discography download
#   ۳. Multiple output formats (mp3, m4a, opus, flac)
#   ۴. Genre-based folder organization
#   ۵. Lyrics extraction & storage (.lrc)
#   ۶. Waveform & artwork download
#   ۷. Rich artist info in artist_info.json (plays, likes, reposts)
#   ۸. Smart README with tracklist, genre, stats
#   ۹. Thumbnail as photo in Bale + formatted Persian caption
#   ۱۰. Audio file sent as music player (sendAudio)
#   ۱۱. Search SoundCloud by query (integrated via inputs)
#   ۱۲. Dedicated folder per platform: soundcloud/artist-slug/
# ============================================================

name: "🎵 SoundCloud Downloader"

on:
  workflow_dispatch:
    inputs:
      soundcloud_urls:
        description: "🔗 SoundCloud URL(s) — separate with space"
        required: true
        type: string
      quality:
        description: "🎧 Audio Quality"
        required: false
        type: choice
        default: "best"
        options:
          - best
          - high
          - medium
          - low
      format_choice:
        description: "🎵 Output Format"
        required: false
        type: choice
        default: "mp3"
        options:
          - mp3
          - m4a
          - opus
          - flac
      download_type:
        description: "📋 Download Type"
        required: false
        type: choice
        default: "single"
        options:
          - single
          - playlist
          - all_artist
      max_tracks:
        description: "🔢 Max Tracks (for playlist/artist)"
        required: false
        type: string
        default: "10"
      extract_lyrics:
        description: "📝 Extract Lyrics"
        required: false
        type: boolean
        default: true
      chat_id:
        description: "🆔 User Chat ID for notification"
        required: false
        type: string
        default: ""
      channel_id:
        description: "📢 Channel ID for archiving"
        required: false
        type: string
        default: ""
      channel_username:
        description: "📢 Channel Username"
        required: false
        type: string
        default: ""

env:
  PROJECT_NAME: "Khashayar Downloader"
  PROJECT_URL: "https://khashayar.one"
  PLATFORM: "soundcloud"

jobs:
  download:
    name: "🎵 Download & Store"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      actions: read

    steps:
      # ── Step 1: Checkout ──────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── Step 2: Git Config ────────────────────────────
      - name: "⚙️ Configure Git"
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Step 3: Cloudflare WARP ───────────────────────
      - name: "🌐 Setup Cloudflare WARP"
        run: |
          docker network create warp-net 2>/dev/null || true
          docker run -d \
            --name warp --restart=no --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp:latest
          sleep 15
          for i in $(seq 1 5); do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then echo "✅ WARP active!"; break; else sleep 5; fi
          done

      # ── Step 4: Dependencies ───────────────────────────
      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip ffmpeg zip curl jq bc unzip
          pip3 install --upgrade yt-dlp --quiet

      # ── Step 5: Setup Parameters ──────────────────────
      - name: "🔧 Setup Download Parameters"
        id: setup
        env:
          SC_URLS: ${{ github.event.inputs.soundcloud_urls }}
          SC_QUALITY: ${{ github.event.inputs.quality }}
          SC_FORMAT: ${{ github.event.inputs.format_choice }}
          SC_TYPE: ${{ github.event.inputs.download_type }}
          SC_MAX: ${{ github.event.inputs.max_tracks }}
          SC_LYRICS: ${{ github.event.inputs.extract_lyrics }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          SC_URLS="${SC_URLS}"
          QUALITY="${SC_QUALITY}"
          FORMAT_CHOICE="${SC_FORMAT}"
          DOWNLOAD_TYPE="${SC_TYPE}"
          MAX_TRACKS="${SC_MAX}"
          EXTRACT_LYRICS="${SC_LYRICS}"
          
          echo "════════════════════════════════════════"
          echo "  $PROJECT_NAME | $PROJECT_URL"
          echo "════════════════════════════════════════"
          echo "🎵 URLs: ${SC_URLS}"
          echo "🎧 Quality: ${QUALITY} | Format: ${FORMAT_CHOICE}"
          echo "📋 Type: ${DOWNLOAD_TYPE} | Max: ${MAX_TRACKS}"
          echo "📝 Lyrics: ${EXTRACT_LYRICS}"
          
          echo "SC_URLS=${SC_URLS}" >> $GITHUB_ENV
          echo "QUALITY=${QUALITY}" >> $GITHUB_ENV
          echo "FORMAT_CHOICE=${FORMAT_CHOICE}" >> $GITHUB_ENV
          echo "DOWNLOAD_TYPE=${DOWNLOAD_TYPE}" >> $GITHUB_ENV
          echo "MAX_TRACKS=${MAX_TRACKS}" >> $GITHUB_ENV
          echo "EXTRACT_LYRICS=${EXTRACT_LYRICS}" >> $GITHUB_ENV
          echo "REPO_OWNER=${REPO_OWNER}" >> $GITHUB_ENV
          echo "REPO_NAME=${REPO_NAME}" >> $GITHUB_ENV
          echo "BRANCH=${BRANCH}" >> $GITHUB_ENV
          echo "BACKUP_DIR=/tmp/sc_downloads_$$" >> $GITHUB_ENV
          echo "REPO_DIR=${GITHUB_WORKSPACE}" >> $GITHUB_ENV
          echo "CACHE_INDEX=${GITHUB_WORKSPACE}/soundcloud/cache_index.json" >> $GITHUB_ENV
          
          mkdir -p /tmp/sc_downloads_$$
          mkdir -p "${GITHUB_WORKSPACE}/soundcloud"
          
          # Initialize cache index if not exists
          if [ ! -f "${GITHUB_WORKSPACE}/soundcloud/cache_index.json" ]; then
            echo '{}' > "${GITHUB_WORKSPACE}/soundcloud/cache_index.json"
          fi
          
          # Quality mapping
          case "${QUALITY}" in
            best)   FORMAT="bestaudio/best" ;;
            high)   FORMAT="bestaudio[abr>=256]/bestaudio" ;;
            medium) FORMAT="bestaudio[abr>=160]/bestaudio" ;;
            low)    FORMAT="bestaudio[abr>=96]/bestaudio" ;;
            *)      FORMAT="bestaudio/best" ;;
          esac
          
          echo "FORMAT=$FORMAT" >> $GITHUB_ENV
          
          # Playlist flag
          if [ "$DOWNLOAD_TYPE" = "playlist" ] || [ "$DOWNLOAD_TYPE" = "all_artist" ]; then
            PLAYLIST_FLAG="--yes-playlist --playlist-end ${MAX_TRACKS}"
          else
            PLAYLIST_FLAG="--no-playlist"
          fi
          echo "PLAYLIST_FLAG=$PLAYLIST_FLAG" >> $GITHUB_ENV
          
          # Format flag
          case "$FORMAT_CHOICE" in
            mp3)  EXTRACT_FLAG="--extract-audio --audio-format mp3 --audio-quality 0 --embed-metadata --embed-thumbnail" ;;
            m4a)  EXTRACT_FLAG="--extract-audio --audio-format m4a --audio-quality 0 --embed-metadata --embed-thumbnail" ;;
            opus) EXTRACT_FLAG="--extract-audio --audio-format opus --audio-quality 0 --embed-metadata --embed-thumbnail" ;;
            flac) EXTRACT_FLAG="--extract-audio --audio-format flac --audio-quality 0 --embed-metadata --embed-thumbnail" ;;
            *)    EXTRACT_FLAG="--extract-audio --audio-format mp3 --audio-quality 0 --embed-metadata --embed-thumbnail" ;;
          esac
          echo "EXTRACT_FLAG=$EXTRACT_FLAG" >> $GITHUB_ENV
          echo "✅ Setup complete"

      # ═══════════════════════════════════════════════════
      # 🆕 Step 5.5: CACHE CHECK — skip if already downloaded
      # ═══════════════════════════════════════════════════
      - name: "🔍 Cache Check — Skip Existing"
        id: cache_check
        run: |
          #!/bin/bash
          set -e
          
          SC_URLS="${{ env.SC_URLS }}"
          CACHE_INDEX="${{ env.CACHE_INDEX }}"
          REPO_DIR="${{ env.REPO_DIR }}"
          
          # Extract track ID from URL
          TRACK_ID=$(echo "$SC_URLS" | grep -oE '[0-9]{6,12}' | head -1 || echo "")
          
          if [ -n "$TRACK_ID" ]; then
            # Check cache index
            CACHED_PATH=$(jq -r ".\"${TRACK_ID}\".path // empty" "$CACHE_INDEX" 2>/dev/null || echo "")
            
            if [ -n "$CACHED_PATH" ] && [ -f "${REPO_DIR}/${CACHED_PATH}" ]; then
              echo "✅ ALREADY CACHED: ${CACHED_PATH}"
              echo "CACHE_HIT=true" >> $GITHUB_ENV
              echo "CACHED_FILE=${CACHED_PATH}" >> $GITHUB_ENV
              echo "CACHED_ARTIST=$(jq -r ".\"${TRACK_ID}\".artist // \"Unknown\"" "$CACHE_INDEX")" >> $GITHUB_ENV
              echo "CACHED_TITLE=$(jq -r ".\"${TRACK_ID}\".title // \"Unknown\"" "$CACHE_INDEX")" >> $GITHUB_ENV
              echo "CACHED_GENRE=$(jq -r ".\"${TRACK_ID}\".genre // \"Unknown\"" "$CACHE_INDEX")" >> $GITHUB_ENV
              echo "CACHED_THUMB=$(jq -r ".\"${TRACK_ID}\".thumbnail // \"\"" "$CACHE_INDEX")" >> $GITHUB_ENV
            else
              echo "🆕 Not in cache — will download"
              echo "CACHE_HIT=false" >> $GITHUB_ENV
            fi
          else
            echo "⚠️ Could not extract track ID"
            echo "CACHE_HIT=false" >> $GITHUB_ENV
          fi

      # ═══════════════════════════════════════════════════
      # Step 6: Download & Process Tracks (SKIP if cache hit)
      # ═══════════════════════════════════════════════════
      - name: "🎵 Download & Process Tracks"
        id: download
        if: env.CACHE_HIT != 'true'
        env:
          BACKUP_DIR: ${{ env.BACKUP_DIR }}
          FORMAT: ${{ env.FORMAT }}
          QUALITY: ${{ env.QUALITY }}
          FORMAT_CHOICE: ${{ env.FORMAT_CHOICE }}
          EXTRACT_FLAG: ${{ env.EXTRACT_FLAG }}
          PLAYLIST_FLAG: ${{ env.PLAYLIST_FLAG }}
          SC_URLS: ${{ env.SC_URLS }}
          EXTRACT_LYRICS: ${{ env.EXTRACT_LYRICS }}
          REPO_OWNER: ${{ env.REPO_OWNER }}
          REPO_NAME: ${{ env.REPO_NAME }}
          BRANCH: ${{ env.BRANCH }}
          REPO_DIR: ${{ env.REPO_DIR }}
          CACHE_INDEX: ${{ env.CACHE_INDEX }}
          GITHUB_WORKSPACE: ${{ env.REPO_DIR }}
        run: |
          #!/bin/bash
          shopt -s nullglob
          set -e
          
          # ═══════════════════════════════════════════
          # Helper functions
          # ═══════════════════════════════════════════
          sanitize_name() {
            local name="$1"
            name=$(echo "$name" | sed 's/[()（）]/_/g' | sed 's/[][{}\/\\<>|:;'"'"'"]/_/g')
            name=$(echo "$name" | tr '[:space:]｜　' '-' | tr -c 'a-zA-Z0-9_-' '-' | tr -s '-' | sed 's/^-//;s/-$//')
            [ -z "$name" ] && name="unknown"
            echo "$name"
          }
          
          format_number() {
            local num=$1
            if [ -z "$num" ] || [ "$num" = "null" ]; then echo "0"; return; fi
            if [ "$num" -gt 1000000 ] 2>/dev/null; then
              echo "$(echo "scale=1; $num / 1000000" | bc)M"
            elif [ "$num" -gt 1000 ] 2>/dev/null; then
              echo "$(echo "scale=1; $num / 1000" | bc)K"
            else
              echo "$num"
            fi
          }
          
          # ═══════════════════════════════════════════
          # Fetch full metadata
          # ═══════════════════════════════════════════
          # Convert space-separated URLs to array
          read -ra URL_ARRAY <<< "$SC_URLS"
          TOTAL_URLS=${#URL_ARRAY[@]}
          
          for SC_URL in "${URL_ARRAY[@]}"; do
          
          echo "🔍 Fetching metadata for: $SC_URL"
          
          INFO_JSON=$(yt-dlp \
            --proxy "socks5://127.0.0.1:1080" \
            --dump-json \
            --skip-download \
            "$SC_URL" 2>/dev/null || echo "{}")
          
          ARTIST=$(echo "$INFO_JSON" | jq -r '.uploader // .artist // "Unknown Artist"')
          TITLE=$(echo "$INFO_JSON" | jq -r '.title // "Unknown Track"')
          GENRE=$(echo "$INFO_JSON" | jq -r '.genre // "Unknown Genre"')
          TRACK_ID=$(echo "$INFO_JSON" | jq -r '.id // ""')
          DURATION=$(echo "$INFO_JSON" | jq -r '.duration // 0')
          PLAY_COUNT=$(echo "$INFO_JSON" | jq -r '.play_count // .like_count // 0')
          LIKE_COUNT=$(echo "$INFO_JSON" | jq -r '.like_count // 0')
          REPOST_COUNT=$(echo "$INFO_JSON" | jq -r '.repost_count // 0')
          DESCRIPTION=$(echo "$INFO_JSON" | jq -r '.description // ""')
          THUMBNAIL_URL=$(echo "$INFO_JSON" | jq -r '.thumbnail // ""')
          
          echo "  🎤 Artist: $ARTIST"
          echo "  🎵 Track: $TITLE"
          echo "  🎸 Genre: $GENRE"
          echo "  ⏱ Duration: ${DURATION}s"
          
          ARTIST_SLUG=$(sanitize_name "$ARTIST")
          GENRE_SLUG=$(sanitize_name "$GENRE")
          TRACK_SLUG=$(sanitize_name "$TITLE")
          
          # ═══════════════════════════════════════════
          # Create folder structure
          # ═══════════════════════════════════════════
          ARTIST_DIR="${REPO_DIR}/soundcloud/${ARTIST_SLUG}"
          GENRE_DIR="${REPO_DIR}/soundcloud/_genres/${GENRE_SLUG}"
          mkdir -p "$ARTIST_DIR" "$GENRE_DIR"
          
          if [ ! -L "${GENRE_DIR}/${ARTIST_SLUG}" ] && [ "$GENRE_SLUG" != "unknown-genre" ]; then
            ln -sf "../../${ARTIST_SLUG}" "${GENRE_DIR}/${ARTIST_SLUG}" 2>/dev/null || true
          fi
          
          # ═══════════════════════════════════════════
          # Artist info
          # ═══════════════════════════════════════════
          # Artist info — using printf to avoid YAML brace issues
          printf '{\n  "artist": "%s",\n  "artist_url": "%s",\n  "artist_id": "%s",\n  "genre": "%s",\n  "total_plays": %s,\n  "total_likes": %s,\n  "total_reposts": %s,\n  "last_updated": "%s"\n}\n' \
            "$ARTIST" \
            "$(echo "$INFO_JSON" | jq -r '.uploader_url // ""')" \
            "$(echo "$INFO_JSON" | jq -r '.uploader_id // ""')" \
            "$GENRE" \
            "${PLAY_COUNT:-0}" \
            "${LIKE_COUNT:-0}" \
            "${REPOST_COUNT:-0}" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > "${ARTIST_DIR}/artist_info.json"
          echo "  📝 Updated artist_info.json"
          
          # ═══════════════════════════════════════════
          # Download
          # ═══════════════════════════════════════════
          TMP_DIR="tmp_sc_$$"
          mkdir -p "$TMP_DIR"
          
          echo "⬇️ Downloading: $TITLE"
          
          yt-dlp \
            --proxy "socks5://127.0.0.1:1080" \
            --format "$FORMAT" \
            $EXTRACT_FLAG \
            --write-thumbnail \
            --no-cache-dir \
            --output "${TMP_DIR}/%(title)s.%(ext)s" \
            --no-part \
            $PLAYLIST_FLAG \
            --retries 5 \
            --fragment-retries 5 \
            --no-check-certificates \
            --concurrent-fragments 8 \
            --buffer-size 16K \
            --http-chunk-size 10M \
            --progress \
            --newline \
            "$SC_URL" 2>&1 || {
              echo "  🔄 Retry without proxy..."
              yt-dlp \
                --format "$FORMAT" \
                $EXTRACT_FLAG \
                --write-thumbnail \
                --no-cache-dir \
                --output "${TMP_DIR}/%(title)s.%(ext)s" \
                --no-part \
                $PLAYLIST_FLAG \
                --retries 5 \
                --fragment-retries 5 \
                --no-check-certificates \
                --concurrent-fragments 8 \
                --progress \
                --newline \
                "$SC_URL" 2>&1
            }
          
          # ═══════════════════════════════════════════
          # Quality Gate
          # ═══════════════════════════════════════════
          for AUDIO_FILE in "$TMP_DIR"/*.$FORMAT_CHOICE; do
            [ -f "$AUDIO_FILE" ] || continue
            BITRATE=$(ffprobe -v error -show_entries format=bit_rate -of csv=p=0 "$AUDIO_FILE" 2>/dev/null || echo "0")
            BITRATE_KBPS=$(( BITRATE / 1000 ))
            echo "  🎧 Bitrate: ${BITRATE_KBPS}kbps"
            if [ "$BITRATE" -gt 0 ] 2>/dev/null && [ "$BITRATE" -lt 96000 ] 2>/dev/null; then
              echo "  ⚠️ Low bitrate — rejecting"
              rm -f "$AUDIO_FILE"
            fi
          done
          
          # ═══════════════════════════════════════════
          # Lyrics
          # ═══════════════════════════════════════════
          if [ "$EXTRACT_LYRICS" = "true" ]; then
            echo "📝 Extracting lyrics..."
            LYRICS=$(echo "$INFO_JSON" | jq -r '.description // ""' | grep -iE 'lyrics|verse|chorus' -A 50 | head -60 || echo "")
            if [ -n "$LYRICS" ]; then
              echo "$LYRICS" > "${ARTIST_DIR}/${TRACK_SLUG}.lrc"
              echo "  ✅ Lyrics saved: ${TRACK_SLUG}.lrc"
            fi
          fi
          
          # ═══════════════════════════════════════════
          # Move files to repo
          # ═══════════════════════════════════════════
          TRACK_COUNT=0
          
          for AUDIO_FILE in "$TMP_DIR"/*.$FORMAT_CHOICE; do
            [ -f "$AUDIO_FILE" ] || continue
            BASENAME=$(basename "$AUDIO_FILE")
            FILENAME_NO_EXT="${BASENAME%.*}"
            SAFE_NAME=$(sanitize_name "$FILENAME_NO_EXT")
            
            cp "$AUDIO_FILE" "${ARTIST_DIR}/${SAFE_NAME}.${FORMAT_CHOICE}"
            echo "  📦 Saved: soundcloud/${ARTIST_SLUG}/${SAFE_NAME}.${FORMAT_CHOICE}"
            
            mkdir -p "${BACKUP_DIR}/${ARTIST_SLUG}"
            cp "$AUDIO_FILE" "${BACKUP_DIR}/${ARTIST_SLUG}/${SAFE_NAME}.${FORMAT_CHOICE}"
            
            TRACK_COUNT=$((TRACK_COUNT + 1))
            
            THUMB_FILE=$(ls "$TMP_DIR"/*.jpg 2>/dev/null | head -1)
            if [ -n "$THUMB_FILE" ] && [ -f "$THUMB_FILE" ]; then
              cp "$THUMB_FILE" "${ARTIST_DIR}/${SAFE_NAME}.jpg" 2>/dev/null
              cp "$THUMB_FILE" "${BACKUP_DIR}/${ARTIST_SLUG}/${SAFE_NAME}.jpg" 2>/dev/null
            fi
            
            CACHE_ENTRY=$(jq -n \
              --arg path "soundcloud/${ARTIST_SLUG}/${SAFE_NAME}.${FORMAT_CHOICE}" \
              --arg artist "$ARTIST" \
              --arg title "$TITLE" \
              --arg genre "$GENRE" \
              --arg thumbnail "$THUMBNAIL_URL" \
              '{path: $path, artist: $artist, title: $title, genre: $genre, thumbnail: $thumbnail, cached_at: "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}')
            
            jq --arg id "$TRACK_ID" --argjson entry "$CACHE_ENTRY" \
              '. + {($id): $entry}' "$CACHE_INDEX" > /tmp/cache_tmp.json
            mv /tmp/cache_tmp.json "$CACHE_INDEX"
            echo "  💾 Cached: $TRACK_ID"
          done

            # Save detailed track info
            printf '{\n  "title": "%s",\n  "artist": "%s",\n  "genre": "%s",\n  "duration": %s,\n  "bpm": %s,\n  "tags": %s,\n  "waveform_url": "%s",\n  "artwork_url": "%s",\n  "permalink_url": "%s",\n  "created_at": "%s"\n}\n' \
              "$TITLE" \
              "$ARTIST" \
              "$GENRE" \
              "${DURATION:-0}" \
              "$(echo "$INFO_JSON" | jq -r '.bpm // 0')" \
              "$(echo "$INFO_JSON" | jq -r '.tags // []' | jq -c '.')" \
              "$(echo "$INFO_JSON" | jq -r '.waveform_url // ""')" \
              "$(echo "$INFO_JSON" | jq -r '.thumbnail // ""')" \
              "$(echo "$INFO_JSON" | jq -r '.permalink_url // ""')" \
              "$(echo "$INFO_JSON" | jq -r '.created_at // ""')" \
              > "${ARTIST_DIR}/${TRACK_SLUG}_info.json"
            echo "  📋 Saved track info: ${TRACK_SLUG}_info.json"
            
          # ═══════════════════════════════════════════
          # README
          # ═══════════════════════════════════════════
          TRACK_LIST=$(ls "${ARTIST_DIR}"/*.${FORMAT_CHOICE} 2>/dev/null | while read f; do
            bn=$(basename "$f" .${FORMAT_CHOICE})
            echo "  🎵 ${bn}"
          done)
          
          printf '# %s\n\n**Genre:** %s  \n**SoundCloud:** [%s](%s)\n\n---\n\n## Stats\n\n| Plays | Likes | Reposts |\n|-------|-------|---------|\n| %s | %s | %s |\n\n---\n\n## Tracks\n\n%s\n\n---\n\n*Downloaded via [khashayar.one](https://khashayar.one)*\n' \
            "$ARTIST" \
            "$GENRE" \
            "$ARTIST" \
            "$(echo "$INFO_JSON" | jq -r '.uploader_url // ""')" \
            "$(format_number $PLAY_COUNT)" \
            "$(format_number $LIKE_COUNT)" \
            "$(format_number $REPOST_COUNT)" \
            "$(echo "$TRACK_LIST" | sed 's/^/  🎵 /')" \
            > "${ARTIST_DIR}/README.md"
          echo "  📝 Updated README.md"
          
          rm -rf "$TMP_DIR"
          
          echo "ARTIST_SLUG=${ARTIST_SLUG}" >> $GITHUB_ENV
          echo "ARTIST=${ARTIST}" >> $GITHUB_ENV
          echo "GENRE=${GENRE}" >> $GITHUB_ENV
          echo "TRACK_TITLE=${TITLE}" >> $GITHUB_ENV
          echo "TRACK_COUNT=${TRACK_COUNT}" >> $GITHUB_ENV
          echo "TRACK_ID=${TRACK_ID}" >> $GITHUB_ENV
          echo "DURATION=${DURATION}" >> $GITHUB_ENV
          echo "THUMBNAIL_URL=${THUMBNAIL_URL}" >> $GITHUB_ENV
          echo "PLAY_COUNT=${PLAY_COUNT}" >> $GITHUB_ENV
          echo "✅ Done: ${TRACK_COUNT} track(s) from this URL"
          
          done  # end of URL loop
          
          echo "✅ All URLs processed: ${TOTAL_URLS} total"

      # ── Step 7: Commit & Push ─────────────────────────
      - name: "📤 Commit to Repository"
        if: env.CACHE_HIT != 'true'
        env:
          ARTIST: ${{ env.ARTIST }}
          TRACK_TITLE: ${{ env.TRACK_TITLE }}
          FORMAT_CHOICE: ${{ env.FORMAT_CHOICE }}
          REPO_DIR: ${{ env.REPO_DIR }}
          BRANCH: ${{ env.BRANCH }}
        run: |
          cd "$REPO_DIR"
          git add soundcloud/
          if git diff --staged --quiet; then
            echo "✅ No changes"
          else
            ARTIST_NAME="${ARTIST:-Unknown Artist}"
            TRACK_NAME="${TRACK_TITLE:-Unknown Track}"
            FORMAT="${FORMAT_CHOICE:-mp3}"
            git commit -m "feat(soundcloud): add ${ARTIST_NAME} — ${TRACK_NAME} [${FORMAT}]"
            git pull --rebase origin ${BRANCH} || true
            git push origin ${BRANCH}
            echo "✅ Pushed"
          fi

      # ═══════════════════════════════════════════════════
      # 🆕 Step 9: Send Thumbnail Photo + Caption to Bale
      # ═══════════════════════════════════════════════════
      - name: "🖼️ Send Track Info to User"
        if: github.event.inputs.chat_id != ''
        env:
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          CACHE_HIT: ${{ env.CACHE_HIT }}
          CACHED_ARTIST: ${{ env.CACHED_ARTIST }}
          CACHED_TITLE: ${{ env.CACHED_TITLE }}
          CACHED_GENRE: ${{ env.CACHED_GENRE }}
          CACHED_THUMB: ${{ env.CACHED_THUMB }}
          ARTIST: ${{ env.ARTIST }}
          TRACK_TITLE: ${{ env.TRACK_TITLE }}
          GENRE: ${{ env.GENRE }}
          THUMBNAIL_URL: ${{ env.THUMBNAIL_URL }}
          DURATION: ${{ env.DURATION }}
          PLAY_COUNT: ${{ env.PLAY_COUNT }}
          SC_URLS: ${{ env.SC_URLS }}
        run: |
          #!/bin/bash
          
          if [ "$CACHE_HIT" = "true" ]; then
            ARTIST_NAME="$CACHED_ARTIST"
            TRACK_NAME="$CACHED_TITLE"
            GENRE_NAME="$CACHED_GENRE"
            THUMB_URL="$CACHED_THUMB"
            DURATION_VAL="0"
            PLAY_COUNT_VAL="0"
          else
            ARTIST_NAME="$ARTIST"
            TRACK_NAME="$TRACK_TITLE"
            GENRE_NAME="$GENRE"
            THUMB_URL="$THUMBNAIL_URL"
            DURATION_VAL="$DURATION"
            PLAY_COUNT_VAL="$PLAY_COUNT"
          fi
          
          if [ "$DURATION_VAL" -gt 0 ] 2>/dev/null; then
            DUR_MIN=$(( DURATION_VAL / 60 ))
            DUR_REM=$(( DURATION_VAL % 60 ))
            DUR_FMT="${DUR_MIN}:$(printf '%02d' $DUR_REM)"
          else
            DUR_FMT="—"
          fi
          
          if [ "$PLAY_COUNT_VAL" != "0" ] && [ "$PLAY_COUNT_VAL" -gt 0 ] 2>/dev/null; then
            if [ "$PLAY_COUNT_VAL" -gt 1000000 ]; then
              PLAYS_FMT="$(echo "scale=1; $PLAY_COUNT_VAL / 1000000" | bc)M"
            elif [ "$PLAY_COUNT_VAL" -gt 1000 ]; then
              PLAYS_FMT="$(echo "scale=1; $PLAY_COUNT_VAL / 1000" | bc)K"
            else
              PLAYS_FMT="$PLAY_COUNT_VAL"
            fi
          else
            PLAYS_FMT="—"
          fi
          
          CAPTION="🎵 *${TRACK_NAME}*

          🎤 *هنرمند:* ${ARTIST_NAME}
          🎸 *ژانر:* ${GENRE_NAME}
          ⏱ *مدت:* ${DUR_FMT}
          👁 *پخش:* ${PLAYS_FMT}

          🔗 [مشاهده در SoundCloud](${SC_URLS})"
          
          PHOTO_SENT=false
          if [ -n "$THUMB_URL" ] && [ "$THUMB_URL" != "null" ]; then
            jq -n \
              --arg chat_id "$CHAT_ID" \
              --arg photo "$THUMB_URL" \
              --arg caption "$CAPTION" \
              '{chat_id: $chat_id, photo: $photo, caption: $caption, parse_mode: "Markdown"}' \
              > /tmp/photo_payload.json
            
            PHOTO_RESPONSE=$(curl -s -X POST "https://tapi.bale.ai/bot${BALE_TOKEN}/sendPhoto" \
              -H "Content-Type: application/json" \
              -d @/tmp/photo_payload.json)
            
            if echo "$PHOTO_RESPONSE" | jq -e '.ok == true' > /dev/null 2>&1; then
              PHOTO_SENT=true
            fi
          fi
          
          if [ "$PHOTO_SENT" = false ]; then
            jq -n \
              --arg chat_id "$CHAT_ID" \
              --arg text "$CAPTION" \
              '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}' \
              > /tmp/text_payload.json
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d @/tmp/text_payload.json > /dev/null 2>&1
          fi
          
          echo "✅ Track info sent"

      # ═══════════════════════════════════════════════════
      # Step 10: Upload Audio to User's Channel
      # ═══════════════════════════════════════════════════
      - name: "📤 Upload to User's Channel"
        if: github.event.inputs.channel_id != ''
        env:
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHANNEL_ID: ${{ github.event.inputs.channel_id }}
          BACKUP_DIR: ${{ env.BACKUP_DIR }}
          FORMAT_CHOICE: ${{ env.FORMAT_CHOICE }}
          CACHE_HIT: ${{ env.CACHE_HIT }}
          CACHED_FILE: ${{ env.CACHED_FILE }}
          REPO_DIR: ${{ env.REPO_DIR }}
        run: |
          #!/bin/bash
          BALE_API_URL="https://tapi.bale.ai/bot${BALE_TOKEN}"
          echo "📤 Uploading audio to Bale channel..."
          
          if [ "$CACHE_HIT" = "true" ]; then
            # Upload from repo cache
            FILE_PATH="${REPO_DIR}/${CACHED_FILE}"
            FILENAME=$(basename "$FILE_PATH")
            echo "  📄 Uploading from cache: $FILENAME"
            
            curl -s -X POST "${BALE_API_URL}/sendAudio" \
              -F "chat_id=${CHANNEL_ID}" \
              -F "audio=@${FILE_PATH}" \
              -F "caption=🎵 ${FILENAME%.*} | SoundCloud" > /dev/null 2>&1
            echo "    ✅ Uploaded"
          else
            # Upload ALL files from ALL artist folders in backup
            for ARTIST_FOLDER in "$BACKUP_DIR"/*/ ; do
              [ -d "$ARTIST_FOLDER" ] || continue
              ARTIST_NAME=$(basename "$ARTIST_FOLDER")
              
              for FILE in "$ARTIST_FOLDER"/*.$FORMAT_CHOICE; do
                [ -f "$FILE" ] || continue
                FILENAME=$(basename "$FILE")
                TRACK_NAME="${FILENAME%.*}"
                
                echo "  📄 Uploading: $FILENAME"
                
                curl -s -X POST "${BALE_API_URL}/sendAudio" \
                  -F "chat_id=${CHANNEL_ID}" \
                  -F "audio=@${FILE}" \
                  -F "caption=🎵 ${ARTIST_NAME} — ${TRACK_NAME} | SoundCloud" > /dev/null 2>&1
                echo "    ✅ Uploaded"
                sleep 3
              done
            done
          fi
          
          echo "✅ All audio files uploaded"

      # ═══════════════════════════════════════════════════
      # Step 11: Notify User with Channel Link
      # ═══════════════════════════════════════════════════
      - name: "📬 Notify User"
        if: github.event.inputs.chat_id != ''
        env:
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          CHANNEL_ID: ${{ github.event.inputs.channel_id }}
          CHANNEL_USERNAME: ${{ github.event.inputs.channel_username }}
        run: |
          #!/bin/bash
          
          ARTIST_NAME="${{ env.ARTIST }}"
          CACHE_HIT="${{ env.CACHE_HIT }}"
          CACHED_ARTIST="${{ env.CACHED_ARTIST }}"
          TRACK_COUNT="${{ env.TRACK_COUNT }}"
          
          if [ "$CACHE_HIT" = "true" ]; then
            DISPLAY_ARTIST="$CACHED_ARTIST"
            SPEED_TEXT="⚡ *از حافظه کش ارسال شد!*"
            TRACK_COUNT="1"
          else
            DISPLAY_ARTIST="$ARTIST_NAME"
            SPEED_TEXT=""
          fi
          
          if [ -n "$CHANNEL_USERNAME" ]; then
            CHANNEL_LINK="https://ble.ir/$CHANNEL_USERNAME"
            KEYBOARD=$(jq -n --arg url "$CHANNEL_LINK" \
              '{inline_keyboard: [[{text: "📂 مشاهده و دریافت فایل", url: $url}]]}')
          elif [ -n "$CHANNEL_ID" ]; then
            CHANNEL_LINK="https://ble.ir/im/p/$CHANNEL_ID"
            KEYBOARD=$(jq -n --arg url "$CHANNEL_LINK" \
              '{inline_keyboard: [[{text: "📂 مشاهده و دریافت فایل", url: $url}]]}')
          else
            KEYBOARD='{"inline_keyboard": []}'
          fi
          
          TEXT=$'✅ *دانلود از SoundCloud کامل شد!*\n\n🎤 *هنرمند:* '"${DISPLAY_ARTIST}"$'\n🎵 *تعداد آهنگ:* '"${TRACK_COUNT:-1}"$'\n'"${SPEED_TEXT}"$'\n\n📁 فایل در کانال آرشیو شما ذخیره شد.\n\n👇 برای دریافت روی دکمه زیر کلیک کنید:'
          
          jq -n \
            --arg chat_id "$CHAT_ID" \
            --arg text "$TEXT" \
            --argjson reply_markup "$KEYBOARD" \
            '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", reply_markup: $reply_markup}' \
            > /tmp/notify.json
          
          curl -s -X POST "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d @/tmp/notify.json > /dev/null 2>&1
          
          echo "✅ Notification sent"
