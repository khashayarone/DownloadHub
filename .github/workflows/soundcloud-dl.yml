# ============================================================
# soundcloud-dl.yml — Bale SoundCloud Downloader V3
# Repository: github.com/khashayardev/DownloadHub
# ============================================================
# Features V3:
#   ۱. Download tracks, playlists, artist discography
#   ۲. Quality mapping: high→320kbps, medium→128kbps (MP3)
#   ۳. Two-Layer Cache compatible (notifies bot via /cache)
#   ۴. Premium-aware: >45MB split into .partX.rar
#   ۵. Free users: >45MB notification with back button
#   ۶. Combined single message (thumbnail + caption + channel + back)
#   ۷. Direct upload via sendAudio
#   ۸. /cache notification with multipart support
#   ۹. WinRAR split volumes for large audio collections
#   ۱۰. No repo storage — direct upload only
#   ۱۱. Compatible with Bale DownloadHub Bot v7
# ============================================================

name: "🎧 SoundCloud Downloader V3"

on:
  workflow_dispatch:
    inputs:
      soundcloud_urls:
        description: "🔗 SoundCloud URL(s)"
        required: true
        type: string
      quality:
        description: "🎧 Quality (high=320kbps, medium=128kbps)"
        required: false
        type: choice
        default: "high"
        options:
          - high
          - medium
      download_type:
        description: "📋 Download Type"
        required: false
        type: choice
        default: "single"
        options:
          - single
          - playlist
          - all_artist
      max_tracks:
        description: "🔢 Max Tracks"
        required: false
        type: string
        default: "10"
      chat_id:
        description: "🆔 User Chat ID"
        required: false
        type: string
        default: ""
      channel_id:
        description: "📢 Channel ID"
        required: false
        type: string
        default: ""
      channel_username:
        description: "📢 Channel Username"
        required: false
        type: string
        default: ""
      is_premium:
        description: "⭐ Premium user?"
        required: false
        type: string
        default: "false"

env:
  PROJECT_NAME: "Khashayar Downloader"
  PROJECT_URL: "https://khashayar.one"
  PLATFORM: "soundcloud"
  TARGET_SIZE_MB: 45
  TARGET_SIZE_BYTES: 47185920
  ADMIN_CHAT_ID: "241726352"
  MAX_PARTS: 20

jobs:
  download:
    name: "🎧 Download & Upload"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      actions: read

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: "⚙️ Configure Git"
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: "🌐 Setup Cloudflare WARP"
        run: |
          docker network create warp-net 2>/dev/null || true
          docker run -d --name warp --restart=no --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp:latest
          sleep 15
          for i in $(seq 1 5); do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then echo "✅ WARP active!"; break; else sleep 5; fi
          done

      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip ffmpeg curl jq bc rar
          pip3 install --upgrade yt-dlp --quiet

      - name: "🔧 Setup Parameters"
        id: setup
        env:
          SC_URLS: ${{ github.event.inputs.soundcloud_urls }}
          SC_QUALITY: ${{ github.event.inputs.quality }}
          SC_TYPE: ${{ github.event.inputs.download_type }}
          SC_MAX: ${{ github.event.inputs.max_tracks }}
          SC_PREMIUM: ${{ github.event.inputs.is_premium }}
        run: |
          SC_URLS="${SC_URLS}"
          QUALITY="${SC_QUALITY}"
          DOWNLOAD_TYPE="${SC_TYPE}"
          MAX_TRACKS="${SC_MAX}"
          IS_PREMIUM="${SC_PREMIUM}"

          echo "════════════════════════════════════════"
          echo "  $PROJECT_NAME | $PROJECT_URL"
          echo "════════════════════════════════════════"
          echo "🎧 URLs: ${SC_URLS}"
          echo "🎵 Quality: ${QUALITY} | Type: ${DOWNLOAD_TYPE} | Max: ${MAX_TRACKS}"
          echo "⭐ Premium: ${IS_PREMIUM}"

          echo "SC_URLS=${SC_URLS}" >> $GITHUB_ENV
          echo "QUALITY=${QUALITY}" >> $GITHUB_ENV
          echo "DOWNLOAD_TYPE=${DOWNLOAD_TYPE}" >> $GITHUB_ENV
          echo "MAX_TRACKS=${MAX_TRACKS}" >> $GITHUB_ENV
          echo "IS_PREMIUM=${IS_PREMIUM}" >> $GITHUB_ENV
          echo "TMP_DIR=/tmp/sc_downloads_$$" >> $GITHUB_ENV
          mkdir -p /tmp/sc_downloads_$$

          # Quality mapping: high→320kbps MP3, medium→128kbps MP3
          case "${QUALITY}" in
            high)   FORMAT="bestaudio[abr>=256]/bestaudio/best" ;;
            medium) FORMAT="bestaudio[abr>=128]/bestaudio/best" ;;
            *)      FORMAT="bestaudio/best" ;;
          esac
          echo "FORMAT=${FORMAT}" >> $GITHUB_ENV

          if [ "$DOWNLOAD_TYPE" = "playlist" ] || [ "$DOWNLOAD_TYPE" = "all_artist" ]; then
            PLAYLIST_FLAG="--yes-playlist --playlist-end ${MAX_TRACKS}"
          else
            PLAYLIST_FLAG="--no-playlist"
          fi
          echo "PLAYLIST_FLAG=${PLAYLIST_FLAG}" >> $GITHUB_ENV
          echo "✅ Setup complete"

      - name: "🎧 Download & Process"
        id: download
        env:
          FORMAT: ${{ env.FORMAT }}
          QUALITY: ${{ env.QUALITY }}
          PLAYLIST_FLAG: ${{ env.PLAYLIST_FLAG }}
          SC_URLS: ${{ env.SC_URLS }}
          IS_PREMIUM: ${{ env.IS_PREMIUM }}
          TMP_DIR: ${{ env.TMP_DIR }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          CHANNEL_ID: ${{ github.event.inputs.channel_id }}
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          #!/bin/bash
          shopt -s nullglob
          set -e

          TARGET_SIZE_BYTES=$(( 45 * 1024 * 1024 ))
          BALE_API="https://tapi.bale.ai/bot${BALE_TOKEN}"
          ADMIN_ID="${ADMIN_CHAT_ID}"
          MAX_PARTS="${MAX_PARTS}"

          sanitize_name() {
            local name="$1"
            name=$(echo "$name" | sed 's/[()（）]/_/g' | sed 's/[][{}\\/\\<>|:;'"'"'"]/_/g')
            name=$(echo "$name" | tr '[:space:]｜　' '-' | tr -c 'a-zA-Z0-9_-' '-' | tr -s '-' | sed 's/^-//;s/-$//')
            [ -z "$name" ] && name="unknown"
            echo "$name"
          }

          format_number() {
            local num=$1
            [ -z "$num" ] || [ "$num" = "null" ] && echo "0" && return
            [ "$num" -gt 1000000 ] 2>/dev/null && echo "$(echo "scale=1; $num/1000000" | bc)M" && return
            [ "$num" -gt 1000 ] 2>/dev/null && echo "$(echo "scale=1; $num/1000" | bc)K" && return
            echo "$num"
          }

          notify_oversized() {
            local fname="$1" fsize="$2" url="$3"
            local fsize_mb=$(( fsize / 1024 / 1024 ))
            local caption="⚠️ *فایل بیشتر از ۴۵ مگابایت است!*\n\n📁 *نام:* ${fname}\n📦 *حجم:* ${fsize_mb}MB\n🔗 *لینک:* ${url}\n\n❌ امکان دانلود در نسخه رایگان وجود ندارد.\n⭐ با خرید اشتراک پریمیوم محدودیت حجم برداشته میشود."
            local kb='{"inline_keyboard":[[{"text":"🔙 بازگشت به منوی اصلی","callback_data":"back_to_main"}]]}'
            curl -s -X POST "${BALE_API}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":$(echo "$caption" | jq -Rsc '.'),\"parse_mode\":\"Markdown\",\"reply_markup\":${kb}}" > /dev/null 2>&1
          }

          notify_multipart_info() {
            local fname="$1" total_parts="$2" url="$3"
            local caption="📦 *فایل به ${total_parts} پارت ۴۵MB تقسیم شد.*\n\n📁 *نام:* ${fname}\n📥 همه پارت‌ها را دانلود کنید، سپس *پارت ۱* را Extract کنید.\n\n🔗 *لینک:* ${url}"
            local kb='{"inline_keyboard":[[{"text":"🔙 بازگشت به منوی اصلی","callback_data":"back_to_main"}]]}'
            curl -s -X POST "${BALE_API}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":$(echo "$caption" | jq -Rsc '.'),\"parse_mode\":\"Markdown\",\"reply_markup\":${kb}}" > /dev/null 2>&1
          }

          notify_cache() {
            local platform="$1" url="$2" quality="$3" file_id="$4" channel_id="$5" message_id="$6" file_size="$7" file_name="$8" is_multipart="$9" total_parts="${10}"
            curl -s -X POST "${BALE_API}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${ADMIN_ID}\",\"text\":\"/cache ${platform} ${url} ${quality} ${file_id} ${channel_id} ${message_id} ${file_size} ${file_name} ${is_multipart} ${total_parts}\"}" > /dev/null 2>&1
            echo "  📤 Cache notification sent"
          }

          read -ra URL_ARRAY <<< "$SC_URLS"
          TOTAL_URLS=${#URL_ARRAY[@]}

          for SC_URL in "${URL_ARRAY[@]}"; do

          echo "🔍 Fetching metadata: $SC_URL"
          INFO_JSON=$(yt-dlp --proxy "socks5://127.0.0.1:1080" --dump-json --skip-download "$SC_URL" 2>/dev/null || echo "{}")

          ARTIST=$(echo "$INFO_JSON" | jq -r '.uploader // .artist // "Unknown Artist"')
          TITLE=$(echo "$INFO_JSON" | jq -r '.title // "Unknown Track"')
          DURATION=$(echo "$INFO_JSON" | jq -r '.duration // 0')
          PLAY_COUNT=$(echo "$INFO_JSON" | jq -r '.play_count // .view_count // 0')
          THUMBNAIL_URL=$(echo "$INFO_JSON" | jq -r '.thumbnail // ""')

          echo "  🎤 $ARTIST | 🎵 $TITLE | 👁 $(format_number $PLAY_COUNT)"

          TMP_DIR="tmp_sc_$$"
          mkdir -p "$TMP_DIR"

          # Download as MP3
          yt-dlp --proxy "socks5://127.0.0.1:1080" \
            --format "$FORMAT" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --embed-metadata --embed-thumbnail \
            --write-thumbnail --convert-thumbnails jpg \
            --no-cache-dir \
            --output "${TMP_DIR}/%(title)s.%(ext)s" \
            --no-part $PLAYLIST_FLAG \
            --retries 5 --fragment-retries 5 --no-check-certificates \
            --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M \
            --progress --newline "$SC_URL" 2>&1 || {
            echo "  🔄 Retry without proxy..."
            yt-dlp --format "$FORMAT" \
              --extract-audio --audio-format mp3 --audio-quality 0 \
              --embed-metadata --embed-thumbnail \
              --write-thumbnail --convert-thumbnails jpg \
              --no-cache-dir \
              --output "${TMP_DIR}/%(title)s.%(ext)s" \
              --no-part $PLAYLIST_FLAG \
              --retries 5 --fragment-retries 5 --no-check-certificates \
              --concurrent-fragments 8 --progress --newline "$SC_URL" 2>&1
          }

          for AUDIO_FILE in "$TMP_DIR"/*.mp3; do
            [ -f "$AUDIO_FILE" ] || continue

            BASENAME=$(basename "$AUDIO_FILE")
            SAFE_NAME=$(sanitize_name "${BASENAME%.*}")
            FILE_SIZE=$(stat -c%s "$AUDIO_FILE" 2>/dev/null || echo 0)

            echo "  📦 ${SAFE_NAME}.mp3 — $(( FILE_SIZE / 1024 / 1024 ))MB"

            # ═══ SIZE CHECK ═══
            if [ "$FILE_SIZE" -gt "$TARGET_SIZE_BYTES" ]; then
              if [ "$IS_PREMIUM" = "true" ]; then
                echo "  ⭐ Premium user — splitting with RAR..."
                SPLIT_DIR="/tmp/rar_split_$$"
                mkdir -p "$SPLIT_DIR"
                cp "$AUDIO_FILE" "${SPLIT_DIR}/${SAFE_NAME}.mp3"
                cd "$SPLIT_DIR"
                rar a -v${TARGET_SIZE_MB}m -ep1 -m0 -idq "${SAFE_NAME}.part.rar" "${SAFE_NAME}.mp3"
                rm -f "${SAFE_NAME}.mp3"
                cd - > /dev/null

                TOTAL_PARTS=$(ls "${SPLIT_DIR}/${SAFE_NAME}.part"*.rar 2>/dev/null | wc -l)
                if [ "$TOTAL_PARTS" -gt "$MAX_PARTS" ]; then
                  echo "  ⚠️ Too many parts — rejecting"
                  if [ -n "$CHAT_ID" ]; then
                    notify_oversized "${SAFE_NAME}.mp3" "$FILE_SIZE" "$SC_URL"
                  fi
                  rm -rf "$SPLIT_DIR"
                  continue
                fi

                echo "  📦 Split into ${TOTAL_PARTS} RAR parts"
                PART_NUM=0
                FIRST_MESSAGE_ID=0
                FIRST_FILE_ID=""

                for PART_FILE in $(ls "${SPLIT_DIR}/${SAFE_NAME}.part"*.rar | sort); do
                  [ -f "$PART_FILE" ] || continue
                  PART_NUM=$((PART_NUM + 1))
                  PART_NAME=$(basename "$PART_FILE")
                  echo "  📤 Uploading part ${PART_NUM}/${TOTAL_PARTS}: ${PART_NAME}"

                  UPLOAD_RESPONSE=$(curl -s -X POST "${BALE_API}/sendDocument" \
                    -F "chat_id=${CHANNEL_ID}" \
                    -F "document=@${PART_FILE}" \
                    -F "caption=")

                  MESSAGE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.message_id // 0')
                  FILE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.document.file_id // ""')

                  if [ "$PART_NUM" -eq 1 ]; then
                    FIRST_MESSAGE_ID=$MESSAGE_ID
                    FIRST_FILE_ID=$FILE_ID
                  fi

                  [ "$MESSAGE_ID" != "0" ] && echo "    ✅ Part ${PART_NUM} uploaded" || echo "    ❌ Part ${PART_NUM} failed"
                  sleep 2
                done

                if [ -n "$CHAT_ID" ] && [ -n "$FIRST_FILE_ID" ] && [ "$FIRST_MESSAGE_ID" != "0" ]; then
                  notify_cache "soundcloud" "$SC_URL" "$QUALITY" "$FIRST_FILE_ID" "${CHANNEL_ID}" "$FIRST_MESSAGE_ID" "$FILE_SIZE" "${SAFE_NAME}.mp3" "1" "$TOTAL_PARTS"
                fi

                if [ -n "$CHAT_ID" ]; then
                  notify_multipart_info "${SAFE_NAME}.mp3" "$TOTAL_PARTS" "$SC_URL"
                fi

                rm -rf "$SPLIT_DIR"
              else
                echo "  ⚠️ Free user — >45MB rejected"
                if [ -n "$CHAT_ID" ]; then
                  notify_oversized "${SAFE_NAME}.mp3" "$FILE_SIZE" "$SC_URL"
                fi
              fi
            else
              # ═══ ≤45MB: Direct upload ═══
              if [ -n "$CHANNEL_ID" ]; then
                UPLOAD_RESPONSE=$(curl -s -X POST "${BALE_API}/sendAudio" \
                  -F "chat_id=${CHANNEL_ID}" -F "audio=@${AUDIO_FILE}" -F "caption=")

                FILE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.audio.file_id // ""')
                MESSAGE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.message_id // 0')

                if [ -n "$FILE_ID" ] && [ "$MESSAGE_ID" != "0" ]; then
                  echo "  ✅ Uploaded (msg_id: $MESSAGE_ID)"
                  if [ -n "$CHAT_ID" ]; then
                    notify_cache "soundcloud" "$SC_URL" "$QUALITY" "$FILE_ID" "${CHANNEL_ID}" "$MESSAGE_ID" "$FILE_SIZE" "${SAFE_NAME}.mp3" "0" "1"
                  fi
                else
                  echo "  ❌ Upload failed: $UPLOAD_RESPONSE"
                fi
                sleep 2
              fi
            fi
          done

          rm -rf "$TMP_DIR"

          echo "ARTIST=${ARTIST}" >> $GITHUB_ENV
          echo "TRACK_TITLE=${TITLE}" >> $GITHUB_ENV
          echo "DURATION=${DURATION}" >> $GITHUB_ENV
          echo "THUMBNAIL_URL=${THUMBNAIL_URL}" >> $GITHUB_ENV
          echo "PLAY_COUNT=${PLAY_COUNT}" >> $GITHUB_ENV

          done

          echo "✅ All URLs processed: ${TOTAL_URLS}"

      - name: "🛑 Stop WARP"
        if: always()
        run: |
          docker stop warp 2>/dev/null || true
          docker rm warp 2>/dev/null || true

      - name: "📬 Send Complete Result"
        if: github.event.inputs.chat_id != ''
        env:
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          SC_URLS: ${{ env.SC_URLS }}
          ARTIST: ${{ env.ARTIST }}
          TRACK_TITLE: ${{ env.TRACK_TITLE }}
          DURATION: ${{ env.DURATION }}
          PLAY_COUNT: ${{ env.PLAY_COUNT }}
          THUMBNAIL_URL: ${{ env.THUMBNAIL_URL }}
          CHANNEL_ID: ${{ github.event.inputs.channel_id }}
          CHANNEL_USERNAME: ${{ github.event.inputs.channel_username }}
        run: |
          #!/bin/bash
          BALE_API="https://tapi.bale.ai/bot${BALE_TOKEN}"
          CHAT_ID="${CHAT_ID}"
          ARTIST_NAME="${ARTIST:-Unknown Artist}"
          TITLE_NAME="${TRACK_TITLE:-Unknown Track}"
          THUMB_URL="${THUMBNAIL_URL:-}"
          DURATION_VAL="${DURATION:-0}"
          PLAY_VAL="${PLAY_COUNT:-0}"

          if [ "$DURATION_VAL" -gt 0 ] 2>/dev/null; then
            DUR_FMT="$(( DURATION_VAL / 60 )):$(printf '%02d' $(( DURATION_VAL % 60 )))"
          else
            DUR_FMT="—"
          fi

          if [ "$PLAY_VAL" != "0" ] && [ "$PLAY_VAL" != "null" ] && [ "$PLAY_VAL" -gt 0 ] 2>/dev/null; then
            if [ "$PLAY_VAL" -gt 1000000 ]; then PLAYS_FMT="$(echo "scale=1; $PLAY_VAL/1000000" | bc)M"
            elif [ "$PLAY_VAL" -gt 1000 ]; then PLAYS_FMT="$(echo "scale=1; $PLAY_VAL/1000" | bc)K"
            else PLAYS_FMT="$PLAY_VAL"; fi
          else
            PLAYS_FMT="—"
          fi

          if [ -n "$CHANNEL_USERNAME" ]; then
            CHANNEL_LINK="https://ble.ir/${CHANNEL_USERNAME}"
          elif [ -n "$CHANNEL_ID" ]; then
            CHANNEL_LINK="https://ble.ir/im/p/${CHANNEL_ID}"
          else
            CHANNEL_LINK="https://ble.ir"
          fi

          CAPTION="🎵 *${TITLE_NAME}*

          🎤 *هنرمند:* ${ARTIST_NAME}
          ⏱ *مدت:* ${DUR_FMT}  |  👁 *پخش:* ${PLAYS_FMT}

          ✅ *دانلود کامل شد!*
          📁 فایل در کانال آرشیو شما ذخیره شد.

          🔗 [مشاهده در SoundCloud](${SC_URLS})"

          KEYBOARD='{"inline_keyboard":[[{"text":"📂 دریافت فایل از کانال آرشیو","url":"'"${CHANNEL_LINK}"'"}],[{"text":"🔙 بازگشت به منوی اصلی","callback_data":"back_to_main"}]]}'

          ESCAPED_CAPTION=$(echo "$CAPTION" | jq -Rsc '.')

          if [ -n "$THUMB_URL" ] && [ "$THUMB_URL" != "null" ]; then
            PHOTO_RESULT=$(curl -s -X POST "${BALE_API}/sendPhoto" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"photo\":\"${THUMB_URL}\",\"caption\":${ESCAPED_CAPTION},\"parse_mode\":\"Markdown\",\"reply_markup\":${KEYBOARD}}")

            if ! echo "$PHOTO_RESULT" | jq -e '.ok == true' > /dev/null 2>&1; then
              curl -s -X POST "${BALE_API}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":${ESCAPED_CAPTION},\"parse_mode\":\"Markdown\",\"reply_markup\":${KEYBOARD}}" > /dev/null 2>&1
            fi
          else
            curl -s -X POST "${BALE_API}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":${ESCAPED_CAPTION},\"parse_mode\":\"Markdown\",\"reply_markup\":${KEYBOARD}}" > /dev/null 2>&1
          fi

          echo "✅ Result sent to user"
