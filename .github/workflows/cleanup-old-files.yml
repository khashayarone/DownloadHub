# ============================================================
# cleanup-old-files.yml — Ultra-Light Cleanup V3.1 (FIXED)
# Repository: github.com/khashayardev/DownloadHub
# ============================================================
# V3.1: Fixed — removes folders without ever downloading files
# - Uses git ls-files + git update-index for metadata-only deletion
# - Then creates an empty commit to record the deletion
# - TOTAL: < 10 seconds, 0 file downloads
# ============================================================

name: "🗑️ Cleanup Old Downloads V3.1"

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

env:
  MAX_AGE_MINUTES: 10

jobs:
  cleanup:
    name: "🗑️ Clean Old Folders (Zero-Download)"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write

    steps:
      # ═══════════════════════════════════════════════════
      # Step 1: Partial Clone — ONLY metadata
      # ═══════════════════════════════════════════════════
      - name: "📥 Partial Clone (Metadata Only)"
        run: |
          echo "⏱ Starting partial clone..."
          
          # Clone with NO blobs — just commit history + tree structure
          git clone \
            --filter=blob:none \
            --no-checkout \
            --single-branch \
            --branch main \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            repo 2>&1
          
          cd repo
          
          # Enable sparse checkout
          git sparse-checkout init --cone 2>/dev/null
          
          # Only checkout cache_index.json files (few KB)
          git sparse-checkout set \
            "youtube/cache_index.json" \
            "soundcloud/cache_index.json" \
            "instagram/cache_index.json" \
            "tiktok/cache_index.json" 2>/dev/null
          
          git checkout main 2>&1
          
          echo "✅ Clone complete"
          echo ""
          echo "📊 Repo stats:"
          echo "   Files tracked: $(git ls-files | wc -l)"
          echo "   Folders: $(git ls-tree -d --name-only HEAD | wc -l)"
          echo ""
          echo "📁 Folder structure (no files downloaded):"
          git ls-tree -d --name-only HEAD 2>/dev/null | head -30

      # ═══════════════════════════════════════════════════
      # Step 2: Find & Remove Old Folders (Metadata-Only)
      # ═══════════════════════════════════════════════════
      - name: "🔍 Find & Remove Old Folders"
        id: cleanup
        working-directory: ./repo
        run: |
          #!/bin/bash
          set -e
          
          CURRENT_TIME=$(date +%s)
          MAX_AGE_SECONDS=$(( MAX_AGE_MINUTES * 60 ))
          DELETED=0
          KEPT=0
          TOTAL_FILES_REMOVED=0
          
          echo "════════════════════════════════════════"
          echo "  🗑️ Cleanup V3.1 — Zero-Download Mode"
          echo "  ⏰ $(date)"
          echo "  📐 Max Age: ${MAX_AGE_MINUTES} min"
          echo "════════════════════════════════════════"
          
          # ═══════════════════════════════════════════════
          # Function: Remove folder (metadata only, no download)
          # ═══════════════════════════════════════════════
          remove_folder() {
            local FOLDER_PATH="$1"
            local PLATFORM="$2"
            
            # Skip special/system folders
            FOLDER_NAME=$(basename "$FOLDER_PATH")
            if [ "$FOLDER_NAME" = "_genres" ] || [ "$FOLDER_NAME" = "__pycache__" ] || [ "$FOLDER_NAME" = "subtitles" ] || [ "$FOLDER_NAME" = ".git" ]; then
              return
            fi
            
            # Get last commit that touched this folder
            LAST_COMMIT_TIME=$(git log -1 --format="%at" -- "$FOLDER_PATH" 2>/dev/null || echo "0")
            
            if [ "$LAST_COMMIT_TIME" = "0" ] || [ -z "$LAST_COMMIT_TIME" ]; then
              echo "  ⚠️ ${FOLDER_PATH} — cannot determine age, skipping"
              return
            fi
            
            AGE_SECONDS=$(( CURRENT_TIME - LAST_COMMIT_TIME ))
            AGE_MINUTES=$(( AGE_SECONDS / 60 ))
            
            echo ""
            echo "  📁 ${FOLDER_PATH}"
            echo "     ⏱ Age: ${AGE_MINUTES} min ($(date -d @${LAST_COMMIT_TIME} '+%H:%M:%S' 2>/dev/null || echo 'unknown'))"
            
            if [ "$AGE_SECONDS" -gt "$MAX_AGE_SECONDS" ]; then
              echo "     🗑️ DELETING (older than ${MAX_AGE_MINUTES} min)..."
              
              # ── Method: Remove from Git index (no file download needed!) ──
              
              # Count files in this folder
              FILE_COUNT=$(git ls-files -- "$FOLDER_PATH" 2>/dev/null | wc -l)
              
              if [ "$FILE_COUNT" -gt 0 ]; then
                # Remove ALL files under this folder from Git index
                git rm -r --cached --quiet -- "$FOLDER_PATH" 2>/dev/null || true
                
                echo "     📄 Files removed from index: ${FILE_COUNT}"
                TOTAL_FILES_REMOVED=$((TOTAL_FILES_REMOVED + FILE_COUNT))
              else
                echo "     ⚠️ No files found in index for this folder"
              fi
              
              # ── Clean cache_index.json ──────────────────
              CACHE_INDEX="${PLATFORM}/cache_index.json"
              if [ -f "$CACHE_INDEX" ]; then
                REL_PATH="${FOLDER_PATH#${PLATFORM}/}"
                
                jq --arg prefix "$REL_PATH" \
                  'with_entries(select(.value.path | startswith($prefix) | not))' \
                  "$CACHE_INDEX" > "${CACHE_INDEX}.tmp" 2>/dev/null
                
                if [ -f "${CACHE_INDEX}.tmp" ]; then
                  mv "${CACHE_INDEX}.tmp" "$CACHE_INDEX"
                  git add "$CACHE_INDEX" 2>/dev/null
                  echo "     🧹 Cache cleaned for: ${REL_PATH}"
                fi
              fi
              
              DELETED=$((DELETED + 1))
              echo "     ✅ Folder removed from tracking"
            else
              echo "     ✅ KEPT (${AGE_MINUTES} min <= ${MAX_AGE_MINUTES} min)"
              KEPT=$((KEPT + 1))
            fi
          }
          
          # ═══════════════════════════════════════════════
          # Scan all platforms
          # ═══════════════════════════════════════════════
          for PLATFORM in youtube soundcloud instagram tiktok; do
            
            echo ""
            echo "  🔍 Scanning: ${PLATFORM}/"
            
            # Get subfolders from git tree
            SUBFOLDERS=$(git ls-tree -d --name-only HEAD -- "${PLATFORM}/" 2>/dev/null || echo "")
            
            if [ -z "$SUBFOLDERS" ]; then
              echo "     (no subfolders)"
              continue
            fi
            
            while IFS= read -r SUBFOLDER; do
              [ -z "$SUBFOLDER" ] && continue
              
              # Skip platform root itself
              if [ "$SUBFOLDER" = "$PLATFORM" ]; then
                continue
              fi
              
              remove_folder "$SUBFOLDER" "$PLATFORM"
            done <<< "$SUBFOLDERS"
          done
          
          # ═══════════════════════════════════════════════
          # Summary
          # ═══════════════════════════════════════════════
          echo ""
          echo "════════════════════════════════════════"
          echo "  📊 Summary:"
          echo "     🗑️ Folders removed: ${DELETED}"
          echo "     📄 Files removed: ${TOTAL_FILES_REMOVED}"
          echo "     ✅ Folders kept: ${KEPT}"
          echo "════════════════════════════════════════"
          
          # Export for next steps
          echo "DELETED=${DELETED}" >> $GITHUB_ENV
          echo "TOTAL_FILES_REMOVED=${TOTAL_FILES_REMOVED}" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════
      # Step 3: Commit & Push
      # ═══════════════════════════════════════════════════
      - name: "📤 Commit & Push Cleanup"
        if: env.DELETED != '0'
        working-directory: ./repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "📋 Files staged for commit:"
          git diff --cached --name-only 2>/dev/null | head -30
          echo ""
          echo "📋 Files staged count: $(git diff --cached --name-only 2>/dev/null | wc -l)"
          
          if git diff --cached --quiet 2>/dev/null; then
            echo "✅ No changes to commit (already clean)"
          else
            git commit -m "chore: cleanup ${DELETED} old folder(s), ${TOTAL_FILES_REMOVED} files [auto]"
            git push origin main 2>&1
            echo "✅ Cleanup pushed successfully"
          fi

      # ═══════════════════════════════════════════════════
      # Step 4: Nothing to delete
      # ═══════════════════════════════════════════════════
      - name: "✅ Nothing to delete"
        if: env.DELETED == '0'
        run: |
          echo "✅ All folders are fresh — nothing to delete"
          echo "   Kept folders: ${{ env.DELETED == '0' && 'all' || 'some' }}"
