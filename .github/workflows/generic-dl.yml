# ============================================================
# generic-dl.yml — Bale Generic Downloader V1
# Repository: github.com/khashayardev/DownloadHub
# ============================================================
# Features V1:
#   ۱. Supports 1800+ sites via yt-dlp (any URL auto-detected)
#   ۲. Auto URL normalization (short links → full URLs)
#   ۳. Auto platform detection from URL patterns
#   ۴. 8 bypass methods + Deno JS solver (for YouTube)
#   ۵. Cache system — instant skip if already downloaded
#   ۶. Quality-aware FFmpeg Segment (direct split, 0% quality loss)
#   ۷. Each segment guaranteed < 45MB for Bale
#   ۸. WARP + Dependencies run in parallel (faster startup)
#   ۹. Speed-optimized: concurrent-fragments 16, buffer 32K
#   ۱۰. Git push with --force-with-lease (no rebase overhead)
#   ۱۱. Persian captions + thumbnail notifications
#   ۱۲. Auto folder: downloads/{platform}/{creator-slug}/
# ============================================================

name: "🌐 Generic Downloader V1"

on:
  workflow_dispatch:
    inputs:
      url:
        description: "🔗 Any Video/Media URL (YouTube, Instagram, TikTok, SoundCloud, Twitter, etc.)"
        required: true
        type: string
      quality:
        description: "📊 Quality"
        required: false
        type: choice
        default: "best"
        options:
          - best
          - 1080
          - 720
          - 480
          - audio
      chat_id:
        description: "🆔 User Chat ID"
        required: false
        type: string
        default: ""
      channel_id:
        description: "📢 Channel ID"
        required: false
        type: string
        default: ""
      channel_username:
        description: "📢 Channel Username"
        required: false
        type: string
        default: ""

env:
  PROJECT_NAME: "Khashayar Downloader"
  PROJECT_URL: "https://khashayar.one"
  TARGET_SIZE_MB: 45
  TARGET_SIZE_BYTES: 47185920

jobs:
  download:
    name: "🌐 Download & Store"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      actions: read

    steps:
      # ═══════════════════════════════════════════════════
      # Step 1: Checkout
      # ═══════════════════════════════════════════════════
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ═══════════════════════════════════════════════════
      # Step 2: Git Config
      # ═══════════════════════════════════════════════════
      - name: "⚙️ Configure Git"
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ═══════════════════════════════════════════════════
      # Step 3: WARP (Background) + Dependencies (Parallel)
      # ═══════════════════════════════════════════════════
      - name: "🌐 Start WARP (Background)"
        run: |
          docker network create warp-net 2>/dev/null || true
          docker run -d \
            --name warp --restart=no --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp:latest
          echo "✅ WARP container started (warming up)"

      - name: "📦 Install Dependencies + Wait WARP"
        run: |
          echo "⏳ Installing packages while WARP warms up..."
          sudo apt-get update -qq 2>&1 | tail -1
          sudo apt-get install -y -qq python3-pip ffmpeg curl jq bc 2>&1 | tail -1
          pip3 install --upgrade yt-dlp --quiet 2>&1 | tail -1
          
          echo "📦 Installing Deno JS Runtime..."
          curl -fsSL https://deno.land/install.sh | sh 2>&1 | tail -2
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          
          echo "⏳ Waiting for WARP..."
          for i in $(seq 1 12); do
            RESULT=$(curl -s --max-time 3 --socks5-hostname 127.0.0.1:1080 \
              https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP ready after ${i}s"
              break
            fi
            sleep 1
          done
          echo "✅ All dependencies ready"

      # ═══════════════════════════════════════════════════
      # Step 4: URL Normalization & Platform Detection
      # ═══════════════════════════════════════════════════
      - name: "🔗 Normalize URL & Detect Platform"
        id: detect
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
        run: |
          #!/bin/bash
          URL="${INPUT_URL}"
          
          echo "════════════════════════════════════════"
          echo "  🔗 Input URL: ${URL}"
          echo "════════════════════════════════════════"
          
          # ── URL Normalization Patterns ──────────────────
          # YouTube Shorts → Standard
          if [[ "$URL" =~ youtube\.com/shorts/([a-zA-Z0-9_-]{11}) ]]; then
            VIDEO_ID="${BASH_REMATCH[1]%%\?*}"
            URL="https://www.youtube.com/watch?v=${VIDEO_ID}"
            echo "🔄 Normalized: YouTube Shorts → Standard"
          
          # youtu.be → youtube.com
          elif [[ "$URL" =~ youtu\.be/([a-zA-Z0-9_-]{11}) ]]; then
            VIDEO_ID="${BASH_REMATCH[1]%%\?*}"
            URL="https://www.youtube.com/watch?v=${VIDEO_ID}"
            echo "🔄 Normalized: youtu.be → youtube.com"
          
          # YouTube Music → Standard
          elif [[ "$URL" =~ music\.youtube\.com/watch ]]; then
            URL="${URL/music.youtube.com/www.youtube.com}"
            echo "🔄 Normalized: YouTube Music → Standard"
          
          # Instagram /reel/ → /p/
          elif [[ "$URL" =~ instagram\.com/reel/ ]]; then
            URL="${URL/\/reel\//\/p\/}"
            echo "🔄 Normalized: Instagram Reel → Post"
          
          # TikTok vm.tiktok.com short links
          elif [[ "$URL" =~ vm\.tiktok\.com ]]; then
            echo "ℹ️ TikTok short link detected (will follow redirect)"
          
          # Twitter/X.com → fix if needed
          elif [[ "$URL" =~ x\.com/ ]]; then
            URL="${URL/x.com/twitter.com}"
            echo "🔄 Normalized: x.com → twitter.com"
          
          # Facebook /share/ → /watch/
          elif [[ "$URL" =~ facebook\.com/share/ ]]; then
            echo "ℹ️ Facebook share link detected"
          
          # Remove tracking parameters
          elif [[ "$URL" =~ \? ]]; then
            BASE_URL="${URL%%\?*}"
            PARAMS="${URL#*\?}"
            CLEAN_PARAMS=""
            IFS='&' read -ra PARAM_ARRAY <<< "$PARAMS"
            for param in "${PARAM_ARRAY[@]}"; do
              key="${param%%=*}"
              if [[ "$key" == "v" ]] || [[ "$key" == "list" ]] || [[ "$key" == "p" ]] || [[ "$key" == "t" ]]; then
                [ -n "$CLEAN_PARAMS" ] && CLEAN_PARAMS="${CLEAN_PARAMS}&"
                CLEAN_PARAMS="${CLEAN_PARAMS}${param}"
              fi
            done
            if [ -n "$CLEAN_PARAMS" ]; then
              URL="${BASE_URL}?${CLEAN_PARAMS}"
              echo "🔄 Cleaned tracking parameters"
            else
              URL="$BASE_URL"
              echo "🔄 Removed all tracking parameters"
            fi
          fi
          
          echo "📎 Normalized URL: ${URL}"
          echo "NORMALIZED_URL=${URL}" >> $GITHUB_ENV
          
          # ── Platform Detection ──────────────────────────
          PLATFORM="generic"
          
          if [[ "$URL" =~ youtube\.com|youtu\.be|music\.youtube\.com|youtube-nocookie\.com ]]; then
            PLATFORM="youtube"
          elif [[ "$URL" =~ soundcloud\.com|on\.soundcloud\.com ]]; then
            PLATFORM="soundcloud"
          elif [[ "$URL" =~ instagram\.com ]]; then
            PLATFORM="instagram"
          elif [[ "$URL" =~ tiktok\.com ]]; then
            PLATFORM="tiktok"
          elif [[ "$URL" =~ twitter\.com|x\.com ]]; then
            PLATFORM="twitter"
          elif [[ "$URL" =~ facebook\.com|fb\.com|fb\.watch ]]; then
            PLATFORM="facebook"
          elif [[ "$URL" =~ vimeo\.com ]]; then
            PLATFORM="vimeo"
          elif [[ "$URL" =~ dailymotion\.com ]]; then
            PLATFORM="dailymotion"
          elif [[ "$URL" =~ twitch\.tv ]]; then
            PLATFORM="twitch"
          elif [[ "$URL" =~ reddit\.com|redd\.it ]]; then
            PLATFORM="reddit"
          elif [[ "$URL" =~ bilibili\.com|b23\.tv ]]; then
            PLATFORM="bilibili"
          elif [[ "$URL" =~ pinterest\.com|pin\.it ]]; then
            PLATFORM="pinterest"
          elif [[ "$URL" =~ rumble\.com ]]; then
            PLATFORM="rumble"
          elif [[ "$URL" =~ odysee\.com ]]; then
            PLATFORM="odysee"
          elif [[ "$URL" =~ dailymotion\.com ]]; then
            PLATFORM="dailymotion"
          elif [[ "$URL" =~ ok\.ru ]]; then
            PLATFORM="okru"
          elif [[ "$URL" =~ vk\.com|vk\.ru ]]; then
            PLATFORM="vk"
          elif [[ "$URL" =~ streamable\.com ]]; then
            PLATFORM="streamable"
          elif [[ "$URL" =~ imgur\.com ]]; then
            PLATFORM="imgur"
          elif [[ "$URL" =~ 9gag\.com ]]; then
            PLATFORM="9gag"
          elif [[ "$URL" =~ mixcloud\.com ]]; then
            PLATFORM="mixcloud"
          elif [[ "$URL" =~ bandcamp\.com ]]; then
            PLATFORM="bandcamp"
          fi
          
          echo "🎯 Detected Platform: ${PLATFORM}"
          echo "PLATFORM=${PLATFORM}" >> $GITHUB_ENV
          echo "✅ URL normalized & platform detected"

      # ═══════════════════════════════════════════════════
      # Step 5: Setup Download Parameters
      # ═══════════════════════════════════════════════════
      - name: "🔧 Setup Parameters"
        id: setup
        env:
          QUALITY: ${{ github.event.inputs.quality }}
        run: |
          QUALITY="${QUALITY}"
          PLATFORM="${{ env.PLATFORM }}"
          
          echo "🎬 Quality: ${QUALITY} | Platform: ${PLATFORM}"
          
          echo "QUALITY=${QUALITY}" >> $GITHUB_ENV
          echo "REPO_DIR=${GITHUB_WORKSPACE}" >> $GITHUB_ENV
          echo "BACKUP_DIR=/tmp/dl_$$" >> $GITHUB_ENV
          echo "CACHE_INDEX=${GITHUB_WORKSPACE}/downloads/cache_index.json" >> $GITHUB_ENV
          
          mkdir -p /tmp/dl_$$
          mkdir -p "${GITHUB_WORKSPACE}/downloads"
          
          if [ ! -f "${GITHUB_WORKSPACE}/downloads/cache_index.json" ]; then
            echo '{}' > "${GITHUB_WORKSPACE}/downloads/cache_index.json"
          fi
          
          # ── Quality-based Format Selection ─────────────
          case "${QUALITY}" in
            audio) FORMAT="bestaudio/bestaudio*/best" ;;
            best)  FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best" ;;
            1080)  FORMAT="bestvideo[height<=1080]+bestaudio/bestvideo[height<=1080]*+bestaudio*/bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
            720)   FORMAT="bestvideo[height<=720]+bestaudio/bestvideo[height<=720]*+bestaudio*/bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
            480)   FORMAT="bestvideo[height<=480]+bestaudio/bestvideo[height<=480]*+bestaudio*/bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
            *)     FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best" ;;
          esac
          echo "FORMAT=${FORMAT}" >> $GITHUB_ENV
          
          # ── Quality Bitrate Caps ────────────────────────
          case "${QUALITY}" in
            1080) QUALITY_MAX_BITRATE=4000 ;;
            720)  QUALITY_MAX_BITRATE=2500 ;;
            480)  QUALITY_MAX_BITRATE=1500 ;;
            audio) QUALITY_MAX_BITRATE=320  ;;
            *)    QUALITY_MAX_BITRATE=3000 ;;
          esac
          echo "QUALITY_MAX_BITRATE=${QUALITY_MAX_BITRATE}" >> $GITHUB_ENV
          
          echo "✅ Parameters configured"

      # ═══════════════════════════════════════════════════
      # Step 6: Cache Check
      # ═══════════════════════════════════════════════════
      - name: "🔍 Cache Check"
        id: cache_check
        run: |
          #!/bin/bash
          URL="${{ env.NORMALIZED_URL }}"
          CACHE_INDEX="${{ env.CACHE_INDEX }}"
          REPO_DIR="${{ env.REPO_DIR }}"
          
          # Generate cache key from URL (hash)
          CACHE_KEY=$(echo "$URL" | md5sum | cut -d' ' -f1 | head -c 12)
          
          echo "🔑 Cache key: ${CACHE_KEY}"
          
          CACHED_PATH=$(jq -r ".\"${CACHE_KEY}\".path // empty" "$CACHE_INDEX" 2>/dev/null || echo "")
          
          if [ -n "$CACHED_PATH" ] && [ -f "${REPO_DIR}/${CACHED_PATH}" ]; then
            echo "✅ CACHE HIT: ${CACHED_PATH}"
            echo "CACHE_HIT=true" >> $GITHUB_ENV
            echo "CACHED_FILE=${CACHED_PATH}" >> $GITHUB_ENV
            echo "CACHED_CREATOR=$(jq -r ".\"${CACHE_KEY}\".creator // \"Unknown\"" "$CACHE_INDEX")" >> $GITHUB_ENV
            echo "CACHED_TITLE=$(jq -r ".\"${CACHE_KEY}\".title // \"Unknown\"" "$CACHE_INDEX")" >> $GITHUB_ENV
            echo "CACHED_THUMB=$(jq -r ".\"${CACHE_KEY}\".thumbnail // \"\"" "$CACHE_INDEX")" >> $GITHUB_ENV
            echo "CACHED_SEGMENTS=$(jq -r ".\"${CACHE_KEY}\".segments // 1" "$CACHE_INDEX")" >> $GITHUB_ENV
          else
            echo "🆕 Not in cache"
            echo "CACHE_HIT=false" >> $GITHUB_ENV
          fi
          
          echo "CACHE_KEY=${CACHE_KEY}" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════
      # Step 7: Download & Process
      # ═══════════════════════════════════════════════════
      - name: "🌐 Download & Process"
        id: download
        if: env.CACHE_HIT != 'true'
        env:
          URL: ${{ env.NORMALIZED_URL }}
          FORMAT: ${{ env.FORMAT }}
          QUALITY: ${{ env.QUALITY }}
          QUALITY_MAX_BITRATE: ${{ env.QUALITY_MAX_BITRATE }}
          BACKUP_DIR: ${{ env.BACKUP_DIR }}
          REPO_DIR: ${{ env.REPO_DIR }}
          CACHE_INDEX: ${{ env.CACHE_INDEX }}
          CACHE_KEY: ${{ env.CACHE_KEY }}
          PLATFORM: ${{ env.PLATFORM }}
        run: |
          #!/bin/bash
          shopt -s nullglob
          set -e
          
          # ── Constants ─────────────────────────────────
          TARGET_SIZE_MB=45
          TARGET_SIZE_BYTES=$(( TARGET_SIZE_MB * 1024 * 1024 ))
          AUDIO_BITRATE_KBPS=128
          MAX_FILE_SIZE=$(( 2048 * 1024 * 1024 ))
          
          # ── Helpers ────────────────────────────────────
          sanitize_name() {
            local name="$1"
            name=$(echo "$name" | sed 's/[()（）]/_/g' | sed 's/[][{}\/\\<>|:;'"'"'"]/_/g')
            name=$(echo "$name" | tr '[:space:]｜　' '-' | tr -c 'a-zA-Z0-9_-' '-' | tr -s '-' | sed 's/^-//;s/-$//')
            [ -z "$name" ] && name="unknown"
            echo "$name"
          }
          
          format_number() {
            local num=$1
            if [ -z "$num" ] || [ "$num" = "null" ]; then echo "0"; return; fi
            if [ "$num" -gt 1000000 ] 2>/dev/null; then echo "$(echo "scale=1; $num / 1000000" | bc)M"
            elif [ "$num" -gt 1000 ] 2>/dev/null; then echo "$(echo "scale=1; $num / 1000" | bc)K"
            else echo "$num"; fi
          }
          
          # ── Download Function (8 methods) ──────────────
          download_media() {
            local METHOD=$1 URL=$2 TMP_DIR=$3
            echo "  🔄 Method $METHOD..."
            
            if [ "$QUALITY" = "audio" ]; then
              COMMON_FLAGS="--extract-audio --audio-format mp3 --audio-quality 0 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --retries 3 --fragment-retries 3 --no-check-certificates --concurrent-fragments 16 --buffer-size 32K --http-chunk-size 20M --progress --newline --extractor-retries 3 --socket-timeout 30"
            else
              COMMON_FLAGS="--merge-output-format mp4 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --retries 3 --fragment-retries 3 --no-check-certificates --concurrent-fragments 16 --buffer-size 32K --http-chunk-size 20M --progress --newline --extractor-retries 3 --socket-timeout 30"
            fi
            
            case $METHOD in
              1) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS \
                   --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" \
                   "$URL" ;;
              2) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS \
                   --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github \
                   "$URL" ;;
              3) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS \
                   --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github \
                   "$URL" ;;
              4) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS \
                   --extractor-args "youtube:player_client=mweb" "$URL" ;;
              5) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS \
                   --extractor-args "youtube:player_client=android_vr" "$URL" ;;
              6) yt-dlp --format "$FORMAT" $COMMON_FLAGS \
                   --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github \
                   "$URL" ;;
              7) yt-dlp --format "$FORMAT" $COMMON_FLAGS \
                   "$URL" ;;
              8) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS \
                   --user-agent "Mozilla/5.0 (Linux; Android 12) AppleWebKit/537.36 Chrome/112.0.0.0 Mobile Safari/537.36" \
                   "$URL" ;;
              *) return 1 ;;
            esac
          }
          
          # ═══════════════════════════════════════════════
          # Main Processing
          # ═══════════════════════════════════════════════
          URL="${{ env.URL }}"
          echo "🔍 Fetching metadata: $URL"
          
          INFO_JSON=$(yt-dlp --proxy "socks5://127.0.0.1:1080" --dump-json --skip-download "$URL" 2>/dev/null || echo "{}")
          
          CREATOR=$(echo "$INFO_JSON" | jq -r '.uploader // .channel // .creator // .artist // "Unknown"')
          TITLE=$(echo "$INFO_JSON" | jq -r '.title // .description // "Untitled"')
          EXTRACTOR=$(echo "$INFO_JSON" | jq -r '.extractor_key // "generic"')
          DURATION=$(echo "$INFO_JSON" | jq -r '.duration // 0')
          VIEW_COUNT=$(echo "$INFO_JSON" | jq -r '.view_count // .play_count // 0')
          LIKE_COUNT=$(echo "$INFO_JSON" | jq -r '.like_count // 0')
          THUMBNAIL_URL=$(echo "$INFO_JSON" | jq -r '.thumbnail // ""')
          WEBPAGE_URL=$(echo "$INFO_JSON" | jq -r '.webpage_url // .original_url // "'"$URL"'"')
          
          echo "  🏷 Extractor: $EXTRACTOR"
          echo "  👤 Creator: $CREATOR"
          echo "  📝 Title: $TITLE"
          
          CREATOR_SLUG=$(sanitize_name "$CREATOR")
          CREATOR_DIR="${REPO_DIR}/downloads/${CREATOR_SLUG}"
          mkdir -p "$CREATOR_DIR"
          
          # ── Creator Info ─────────────────────────────
          printf '{\n  "creator": "%s",\n  "extractor": "%s",\n  "url": "%s",\n  "views": %s,\n  "likes": %s,\n  "last_updated": "%s"\n}\n' \
            "$CREATOR" "$EXTRACTOR" "$WEBPAGE_URL" "${VIEW_COUNT:-0}" "${LIKE_COUNT:-0}" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > "${CREATOR_DIR}/creator_info.json"
          
          # ── Download ─────────────────────────────────
          TMP_DIR="tmp_dl_$$"
          mkdir -p "$TMP_DIR"
          echo "⬇️ Downloading: $TITLE"
          
          DOWNLOAD_SUCCESS=false
          for METHOD in 1 2 3 4 5 6 7 8; do
            if download_media $METHOD "$URL" "$TMP_DIR"; then
              echo "  ✅ Downloaded (method $METHOD)"
              DOWNLOAD_SUCCESS=true
              break
            else
              echo "  ❌ Method $METHOD failed"
              sleep 1
            fi
          done
          
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "  🚫 All methods failed"
            rm -rf "$TMP_DIR"
            echo "DOWNLOAD_SUCCESS=false" >> $GITHUB_ENV
            exit 0
          fi
          
          # ═══════════════════════════════════════════════
          # Quality-Aware FFmpeg Segment
          # ═══════════════════════════════════════════════
          VIDEO_COUNT=0
          TOTAL_SEGMENTS=0
          
          for MEDIA_FILE in "$TMP_DIR"/*.mp4 "$TMP_DIR"/*.webm "$TMP_DIR"/*.mkv "$TMP_DIR"/*.mp3 "$TMP_DIR"/*.m4a "$TMP_DIR"/*.mov "$TMP_DIR"/*.avi; do
            [ -f "$MEDIA_FILE" ] || continue
            
            BASENAME=$(basename "$MEDIA_FILE")
            FILENAME_NO_EXT="${BASENAME%.*}"
            SAFE_NAME=$(sanitize_name "$FILENAME_NO_EXT")
            EXT="${BASENAME##*.}"
            FILE_SIZE=$(stat -c%s "$MEDIA_FILE" 2>/dev/null || echo 0)
            
            [ "$FILE_SIZE" -gt "$MAX_FILE_SIZE" ] && echo "  ⚠️ >2GB — skip" && continue
            
            if [ "$FILE_SIZE" -gt "$TARGET_SIZE_BYTES" ]; then
              echo ""
              echo "  ╔══════════════════════════════════════╗"
              echo "  ║  📦 $(( FILE_SIZE / 1024 / 1024 ))MB — SEGMENTING  ║"
              echo "  ╚══════════════════════════════════════╝"
              
              # Analyze
              VIDEO_BITRATE=$(ffprobe -v error -select_streams v:0 -show_entries stream=bit_rate -of csv=p=0 "$MEDIA_FILE" 2>/dev/null || echo "0")
              DURATION_SEC=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$MEDIA_FILE" 2>/dev/null || echo "0")
              VIDEO_HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 "$MEDIA_FILE" 2>/dev/null || echo "0")
              
              [ -z "$VIDEO_BITRATE" ] || [ "$VIDEO_BITRATE" = "0" ] || [ "$VIDEO_BITRATE" = "N/A" ] && \
                VIDEO_BITRATE=$(echo "scale=0; ($FILE_SIZE * 8) / ($DURATION_SEC * 1000)" | bc 2>/dev/null || echo "2000")
              
              VIDEO_BITRATE_KBPS=$(( VIDEO_BITRATE / 1000 ))
              echo "  📊 ${VIDEO_BITRATE_KBPS}kbps, ${VIDEO_HEIGHT}p, ${DURATION_SEC}s"
              
              # Calculate segment duration for 45MB
              TARGET_BITS=$(( TARGET_SIZE_MB * 8 * 1024 * 1024 * 90 / 100 ))
              SEGMENT_DURATION=$(echo "scale=0; $TARGET_BITS / (${VIDEO_BITRATE_KBPS} * 1000)" | bc 2>/dev/null || echo "120")
              [ "$SEGMENT_DURATION" -lt 30 ] && SEGMENT_DURATION=30
              [ "$SEGMENT_DURATION" -gt 600 ] && SEGMENT_DURATION=600
              
              echo "  ⏱ Segment: ${SEGMENT_DURATION}s | 🎯 Direct Split (0% loss)"
              
              SEGMENT_DIR="${BACKUP_DIR}/${CREATOR_SLUG}/segments"
              mkdir -p "$SEGMENT_DIR"
              
              # Direct split — no re-encode
              ffmpeg -i "$MEDIA_FILE" -c copy -map 0 \
                -segment_time "$SEGMENT_DURATION" -f segment \
                -reset_timestamps 1 -segment_start_number 1 \
                "${SEGMENT_DIR}/${SAFE_NAME}_part%03d.${EXT}" \
                -y -loglevel error 2>&1
              
              # Verify & fix oversized
              SEGMENT_COUNT=0
              for SEG_FILE in "${SEGMENT_DIR}/${SAFE_NAME}_part"*.${EXT}; do
                [ -f "$SEG_FILE" ] || continue
                SEG_SIZE=$(stat -c%s "$SEG_FILE" 2>/dev/null || echo 0)
                SEG_SIZE_MB=$(( SEG_SIZE / 1024 / 1024 ))
                SEGMENT_COUNT=$((SEGMENT_COUNT + 1))
                
                if [ "$SEG_SIZE" -gt "$TARGET_SIZE_BYTES" ]; then
                  echo "    ⚠️ ${SEG_SIZE_MB}MB — fixing..."
                  REDUCED=$(( TARGET_SIZE_MB * 8 * 1000 * 85 / 100 / (DURATION_SEC / SEGMENT_COUNT) ))
                  [ "$REDUCED" -lt 200 ] && REDUCED=200
                  ffmpeg -i "$SEG_FILE" -c:v libx264 -b:v "${REDUCED}k" \
                    -maxrate "${REDUCED}k" -bufsize "$(( REDUCED * 2 ))k" \
                    -preset fast -c:a aac -b:a 128k \
                    "${SEG_FILE}.fixed.${EXT}" -y -loglevel error 2>&1
                  [ -f "${SEG_FILE}.fixed.${EXT}" ] && mv "${SEG_FILE}.fixed.${EXT}" "$SEG_FILE"
                  echo "      ✅ Fixed"
                else
                  echo "    ✅ ${SEG_SIZE_MB}MB OK"
                fi
              done
              echo "  📊 ${SEGMENT_COUNT} segments"
              
              # Copy to repo
              for SEG_FILE in "${SEGMENT_DIR}/${SAFE_NAME}_part"*.${EXT}; do
                [ -f "$SEG_FILE" ] || continue
                SEG_BASENAME=$(basename "$SEG_FILE")
                cp "$SEG_FILE" "${CREATOR_DIR}/${SEG_BASENAME}"
                VIDEO_COUNT=$((VIDEO_COUNT + 1))
              done
              TOTAL_SEGMENTS=$SEGMENT_COUNT
              
            else
              echo "  📦 $(( FILE_SIZE / 1024 / 1024 ))MB — direct save"
              cp "$MEDIA_FILE" "${CREATOR_DIR}/${SAFE_NAME}.${EXT}"
              mkdir -p "${BACKUP_DIR}/${CREATOR_SLUG}"
              cp "$MEDIA_FILE" "${BACKUP_DIR}/${CREATOR_SLUG}/${SAFE_NAME}.${EXT}"
              VIDEO_COUNT=$((VIDEO_COUNT + 1))
              TOTAL_SEGMENTS=1
            fi
            
            # Thumbnail
            THUMB_FILE=$(ls "$TMP_DIR"/*.jpg 2>/dev/null | head -1)
            if [ -n "$THUMB_FILE" ] && [ -f "$THUMB_FILE" ]; then
              cp "$THUMB_FILE" "${CREATOR_DIR}/${SAFE_NAME}.jpg" 2>/dev/null
            fi
            
            # Cache
            CACHE_ENTRY=$(jq -n \
              --arg path "downloads/${CREATOR_SLUG}/${SAFE_NAME}.${EXT}" \
              --arg creator "$CREATOR" --arg title "$TITLE" \
              --arg thumbnail "$THUMBNAIL_URL" --argjson segments "$TOTAL_SEGMENTS" \
              '{path: $path, creator: $creator, title: $title, thumbnail: $thumbnail, segments: $segments, cached_at: "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}')
            jq --arg id "$CACHE_KEY" --argjson entry "$CACHE_ENTRY" \
              '. + {($id): $entry}' "$CACHE_INDEX" > /tmp/cache_tmp.json
            mv /tmp/cache_tmp.json "$CACHE_INDEX"
            
            # Info JSON
            printf '{\n  "title": "%s",\n  "creator": "%s",\n  "extractor": "%s",\n  "duration": %s,\n  "views": %s,\n  "thumbnail": "%s",\n  "url": "%s",\n  "segments": %s\n}\n' \
              "$TITLE" "$CREATOR" "$EXTRACTOR" "${DURATION:-0}" "${VIEW_COUNT:-0}" \
              "$THUMBNAIL_URL" "$WEBPAGE_URL" "$TOTAL_SEGMENTS" \
              > "${CREATOR_DIR}/${SAFE_NAME}_info.json"
            
          done
          
          # README
          FILE_LIST=$(ls "${CREATOR_DIR}"/*.mp4 "${CREATOR_DIR}"/*.webm "${CREATOR_DIR}"/*.mkv "${CREATOR_DIR}"/*.mp3 2>/dev/null | while read f; do
            bn=$(basename "$f"); echo "  📁 ${bn}"
          done)
          printf '# %s\n\n**Source:** %s\n**URL:** %s\n\n| Views | Likes |\n|-------|-------|\n| %s | %s |\n\n## Files (%s segment(s))\n\n%s\n\n*via [khashayar.one](https://khashayar.one)*\n' \
            "$CREATOR" "$EXTRACTOR" "$WEBPAGE_URL" \
            "$(format_number $VIEW_COUNT)" "$(format_number $LIKE_COUNT)" \
            "${TOTAL_SEGMENTS}" "$(echo "$FILE_LIST" | sed 's/^/  /')" \
            > "${CREATOR_DIR}/README.md"
          
          rm -rf "$TMP_DIR"
          
          echo "CREATOR=${CREATOR}" >> $GITHUB_ENV
          echo "CREATOR_SLUG=${CREATOR_SLUG}" >> $GITHUB_ENV
          echo "TITLE=${TITLE}" >> $GITHUB_ENV
          echo "EXTRACTOR=${EXTRACTOR}" >> $GITHUB_ENV
          echo "VIDEO_COUNT=${VIDEO_COUNT}" >> $GITHUB_ENV
          echo "DURATION=${DURATION}" >> $GITHUB_ENV
          echo "THUMBNAIL_URL=${THUMBNAIL_URL}" >> $GITHUB_ENV
          echo "VIEW_COUNT=${VIEW_COUNT}" >> $GITHUB_ENV
          echo "TOTAL_SEGMENTS=${TOTAL_SEGMENTS}" >> $GITHUB_ENV
          echo "DOWNLOAD_SUCCESS=true" >> $GITHUB_ENV
          echo "✅ Done: ${VIDEO_COUNT} file(s), ${TOTAL_SEGMENTS} segment(s)"

      # ═══════════════════════════════════════════════════
      # Step 8: Commit & Push
      # ═══════════════════════════════════════════════════
      - name: "📤 Commit & Push"
        if: env.CACHE_HIT != 'true' && env.DOWNLOAD_SUCCESS == 'true'
        run: |
          cd "$REPO_DIR"
          git add downloads/
          if git diff --staged --quiet; then
            echo "✅ No changes"
          else
            git commit -m "feat: add ${{ env.CREATOR }} — ${{ env.TITLE }} [${{ env.EXTRACTOR }}]" --quiet
            git push origin main --force-with-lease 2>&1
            echo "✅ Pushed"
          fi

      # ═══════════════════════════════════════════════════
      # Step 9: Stop WARP
      # ═══════════════════════════════════════════════════
      - name: "🛑 Stop WARP"
        if: always()
        run: |
          docker stop warp 2>/dev/null || true
          docker rm warp 2>/dev/null || true

      # ═══════════════════════════════════════════════════
      # Step 10: Send Info to User
      # ═══════════════════════════════════════════════════
      - name: "🖼️ Send Info to User"
        if: github.event.inputs.chat_id != '' && env.DOWNLOAD_SUCCESS == 'true'
        env:
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
        run: |
          #!/bin/bash
          CREATOR_NAME="${{ env.CREATOR }}"
          TITLE_NAME="${{ env.TITLE }}"
          EXTRACTOR_NAME="${{ env.EXTRACTOR }}"
          THUMB_URL="${{ env.THUMBNAIL_URL }}"
          SEG_COUNT="${TOTAL_SEGMENTS:-1}"
          VIEW_VAL="${{ env.VIEW_COUNT }}"
          DURATION_VAL="${{ env.DURATION }}"
          URL="${{ env.NORMALIZED_URL }}"
          
          [ "$DURATION_VAL" -gt 0 ] 2>/dev/null && \
            DUR_FMT="$(( DURATION_VAL / 60 )):$(printf '%02d' $(( DURATION_VAL % 60 )))" || DUR_FMT="—"
          
          if [ "$VIEW_VAL" != "0" ] && [ "$VIEW_VAL" -gt 0 ] 2>/dev/null; then
            [ "$VIEW_VAL" -gt 1000000 ] && VIEWS_FMT="$(echo "scale=1; $VIEW_VAL / 1000000" | bc)M" || \
            [ "$VIEW_VAL" -gt 1000 ] && VIEWS_FMT="$(echo "scale=1; $VIEW_VAL / 1000" | bc)K" || VIEWS_FMT="$VIEW_VAL"
          else
            VIEWS_FMT="—"
          fi
          
          [ "$SEG_COUNT" -gt 1 ] && SEGMENT_INFO="📦 *تعداد قسمت:* ${SEG_COUNT} (همه قابل پخش)" || SEGMENT_INFO=""
          
          CAPTION="🎬 *${TITLE_NAME}*
          👤 *سازنده:* ${CREATOR_NAME}
          🏷 *منبع:* ${EXTRACTOR_NAME}
          ⏱ *مدت:* ${DUR_FMT}
          👁 *بازدید:* ${VIEWS_FMT}
          ${SEGMENT_INFO}
          🔗 [لینک منبع](${URL})"
          
          PHOTO_SENT=false
          if [ -n "$THUMB_URL" ] && [ "$THUMB_URL" != "null" ]; then
            jq -n --arg chat_id "$CHAT_ID" --arg photo "$THUMB_URL" --arg caption "$CAPTION" \
              '{chat_id: $chat_id, photo: $photo, caption: $caption, parse_mode: "Markdown"}' > /tmp/photo.json
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_TOKEN}/sendPhoto" \
              -H "Content-Type: application/json" -d @/tmp/photo.json | jq -e '.ok' > /dev/null 2>&1 && PHOTO_SENT=true
          fi
          
          if [ "$PHOTO_SENT" = false ]; then
            jq -n --arg chat_id "$CHAT_ID" --arg text "$CAPTION" \
              '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}' > /tmp/text.json
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" -d @/tmp/text.json > /dev/null 2>&1
          fi
          echo "✅ Info sent"

      # ═══════════════════════════════════════════════════
      # Step 11: Upload to Channel
      # ═══════════════════════════════════════════════════
      - name: "📤 Upload to Channel"
        if: github.event.inputs.channel_id != '' && env.DOWNLOAD_SUCCESS == 'true'
        env:
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHANNEL_ID: ${{ github.event.inputs.channel_id }}
          BACKUP_DIR: ${{ env.BACKUP_DIR }}
          QUALITY: ${{ env.QUALITY }}
        run: |
          #!/bin/bash
          API="https://tapi.bale.ai/bot${BALE_TOKEN}"
          echo "📤 Uploading..."
          
          for CREATOR_FOLDER in "$BACKUP_DIR"/*/; do
            [ -d "$CREATOR_FOLDER" ] || continue
            CREATOR_NAME=$(basename "$CREATOR_FOLDER")
            
            for FILE in "$CREATOR_FOLDER"/segments/* "$CREATOR_FOLDER"/* "$CREATOR_FOLDER"/segments/*_sub*.mp4; do
              [ -f "$FILE" ] || continue
              [[ "$FILE" == *.jpg ]] && continue
              FILENAME=$(basename "$FILE")
              
              if [[ "$FILENAME" =~ _part([0-9]+) ]]; then
                CAPTION="📁 ${CREATOR_NAME} — ${FILENAME%.*} | Part ${BASH_REMATCH[1]}"
              else
                CAPTION="📁 ${CREATOR_NAME} — ${FILENAME%.*}"
              fi
              
              echo "  📄 $FILENAME"
              if [[ "$FILENAME" == *.mp3 ]] || [[ "$QUALITY" == "audio" ]]; then
                curl -s -X POST "${API}/sendAudio" -F "chat_id=${CHANNEL_ID}" \
                  -F "audio=@${FILE}" -F "caption=${CAPTION}" > /dev/null 2>&1
              else
                curl -s -X POST "${API}/sendVideo" -F "chat_id=${CHANNEL_ID}" \
                  -F "video=@${FILE}" -F "caption=${CAPTION}" > /dev/null 2>&1
              fi
              echo "    ✅"
              sleep 3
            done
          done
          echo "✅ Uploads done"

      # ═══════════════════════════════════════════════════
      # Step 12: Notify User
      # ═══════════════════════════════════════════════════
      - name: "📬 Notify User"
        if: github.event.inputs.chat_id != '' && env.DOWNLOAD_SUCCESS == 'true'
        env:
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          CHANNEL_USERNAME: ${{ github.event.inputs.channel_username }}
          CHANNEL_ID_INPUT: ${{ github.event.inputs.channel_id }}
        run: |
          #!/bin/bash
          [ -n "$CHANNEL_USERNAME" ] && CHANNEL_LINK="https://ble.ir/$CHANNEL_USERNAME" || \
          [ -n "$CHANNEL_ID_INPUT" ] && CHANNEL_LINK="https://ble.ir/im/p/$CHANNEL_ID_INPUT" || CHANNEL_LINK=""
          
          [ -n "$CHANNEL_LINK" ] && \
            KEYBOARD='{"inline_keyboard":[[{"text":"📂 مشاهده و دریافت فایل","url":"'"$CHANNEL_LINK"'"}]]}' || \
            KEYBOARD='{"inline_keyboard":[]}'
          
          TEXT=$'✅ *دانلود کامل شد!*\n\n👤 *سازنده:* ${{ env.CREATOR }}\n📁 *فایل:* ${{ env.VIDEO_COUNT }} عدد\n📦 *قسمت:* ${{ env.TOTAL_SEGMENTS }} عدد\n\n📁 فایل در کانال آرشیو شما ذخیره شد.\n👇 برای دریافت روی دکمه زیر کلیک کنید:'
          
          jq -n --arg chat_id "$CHAT_ID" --arg text "$TEXT" --argjson reply_markup "$KEYBOARD" \
            '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", reply_markup: $reply_markup}' > /tmp/notify.json
          curl -s -X POST "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" -d @/tmp/notify.json > /dev/null 2>&1
          echo "✅ Notification sent"
