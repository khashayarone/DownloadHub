# ============================================================
# instagram-dl.yml вҖ” Bale Instagram Downloader V6
# Repository: github.com/khashayarone/DownloadHub
# ============================================================
# Features V6:
#   Ыұ. Download posts, reels, stories, IGTV (video only)
#   ЫІ. Quality mapping: 720вҶ’best, 480вҶ’medium
#   Ыі. Two-Layer Cache compatible (notifies bot via /cache)
#   Ыҙ. Premium-aware: >45MB split into .partX.rar
#   Ыө. Free users: >45MB notification with back button
#   Ы¶. Combined single message (thumbnail + caption + channel + back)
#   Ы·. Direct upload via sendVideo / sendDocument (RAR parts)
#   Ыё. /cache notification with multipart support
#   Ы№. WinRAR split volumes (.part1.rar, .part2.rar, ...)
#   ЫұЫ°. No repo storage вҖ” direct upload only
#   ЫұЫұ. Caption on channel files: empty (like YouTube)
#   ЫұЫІ. Compatible with Bale DownloadHub Bot v7
# ============================================================

name: "рҹ“ё Instagram Downloader V6"

on:
  workflow_dispatch:
    inputs:
      instagram_urls:
        description: "рҹ”— Instagram URL(s)"
        required: true
        type: string
      quality:
        description: "рҹ“ё Quality (720=best, 480=medium)"
        required: false
        type: choice
        default: "720"
        options:
          - "720"
          - "480"
      download_type:
        description: "рҹ“Ӣ Download Type"
        required: false
        type: choice
        default: "single"
        options:
          - single
          - all_posts
      max_items:
        description: "рҹ”ў Max Items"
        required: false
        type: string
        default: "10"
      chat_id:
        description: "рҹҶ” User Chat ID"
        required: false
        type: string
        default: ""
      channel_id:
        description: "рҹ“ў Channel ID"
        required: false
        type: string
        default: ""
      channel_username:
        description: "рҹ“ў Channel Username"
        required: false
        type: string
        default: ""
      is_premium:
        description: "вӯҗ Premium user?"
        required: false
        type: string
        default: "false"

env:
  PROJECT_NAME: "Khashayar Downloader"
  PROJECT_URL: "https://khashayar.one"
  PLATFORM: "instagram"
  TARGET_SIZE_MB: 45
  TARGET_SIZE_BYTES: 47185920
  ADMIN_CHAT_ID: "241726352"
  MAX_PARTS: 20

jobs:
  download:
    name: "рҹ“ё Download & Upload"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      actions: read

    steps:
      - name: "рҹ“Ҙ Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: "вҡҷпёҸ Configure Git"
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: "рҹҢҗ Setup Cloudflare WARP"
        run: |
          docker network create warp-net 2>/dev/null || true
          docker run -d --name warp --restart=no --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp:latest
          sleep 15
          for i in $(seq 1 5); do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then echo "вң… WARP active!"; break; else sleep 5; fi
          done

      - name: "рҹ“Ұ Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip ffmpeg curl jq bc rar
          pip3 install --upgrade yt-dlp --quiet

      - name: "рҹ”§ Setup Parameters"
        id: setup
        env:
          IG_URLS: ${{ github.event.inputs.instagram_urls }}
          IG_QUALITY: ${{ github.event.inputs.quality }}
          IG_TYPE: ${{ github.event.inputs.download_type }}
          IG_MAX: ${{ github.event.inputs.max_items }}
          IG_PREMIUM: ${{ github.event.inputs.is_premium }}
        run: |
          IG_URLS="${IG_URLS}"
          QUALITY="${IG_QUALITY}"
          DOWNLOAD_TYPE="${IG_TYPE}"
          MAX_ITEMS="${IG_MAX}"
          IS_PREMIUM="${IG_PREMIUM}"

          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
          echo "  $PROJECT_NAME | $PROJECT_URL"
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
          echo "рҹ“ё URLs: ${IG_URLS}"
          echo "рҹ“Ҡ Quality: ${QUALITY} | Type: ${DOWNLOAD_TYPE} | Max: ${MAX_ITEMS}"
          echo "вӯҗ Premium: ${IS_PREMIUM}"

          echo "IG_URLS=${IG_URLS}" >> $GITHUB_ENV
          echo "QUALITY=${QUALITY}" >> $GITHUB_ENV
          echo "DOWNLOAD_TYPE=${DOWNLOAD_TYPE}" >> $GITHUB_ENV
          echo "MAX_ITEMS=${MAX_ITEMS}" >> $GITHUB_ENV
          echo "IS_PREMIUM=${IS_PREMIUM}" >> $GITHUB_ENV
          echo "TMP_DIR=/tmp/ig_downloads_$$" >> $GITHUB_ENV
          mkdir -p /tmp/ig_downloads_$$

          case "${QUALITY}" in
            720)   FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best" ;;
            480)   FORMAT="bestvideo[height<=720]+bestaudio/bestvideo[height<=720]*+bestaudio*/best" ;;
            *)     FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best" ;;
          esac
          echo "FORMAT=${FORMAT}" >> $GITHUB_ENV

          if [ "$DOWNLOAD_TYPE" = "all_posts" ]; then
            PLAYLIST_FLAG="--yes-playlist --playlist-end ${MAX_ITEMS}"
          else
            PLAYLIST_FLAG="--no-playlist"
          fi
          echo "PLAYLIST_FLAG=${PLAYLIST_FLAG}" >> $GITHUB_ENV
          echo "вң… Setup complete"

      - name: "рҹ“ё Download & Process"
        id: download
        env:
          FORMAT: ${{ env.FORMAT }}
          PLAYLIST_FLAG: ${{ env.PLAYLIST_FLAG }}
          IG_URLS: ${{ env.IG_URLS }}
          IS_PREMIUM: ${{ env.IS_PREMIUM }}
          TMP_DIR: ${{ env.TMP_DIR }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          CHANNEL_ID: ${{ github.event.inputs.channel_id }}
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          #!/bin/bash
          shopt -s nullglob
          set -e

          TARGET_SIZE_BYTES=$(( 45 * 1024 * 1024 ))
          BALE_API="https://tapi.bale.ai/bot${BALE_TOKEN}"
          ADMIN_ID="${ADMIN_CHAT_ID}"
          MAX_PARTS="${MAX_PARTS}"

          sanitize_name() {
            local name="$1"
            name=$(echo "$name" | sed 's/[()пјҲпјү]/_/g' | sed 's/[][{}\\/\\<>|:;'"'"'"]/_/g')
            name=$(echo "$name" | tr '[:space:]пҪңгҖҖ' '-' | tr -c 'a-zA-Z0-9_-' '-' | tr -s '-' | sed 's/^-//;s/-$//')
            [ -z "$name" ] && name="unknown"
            echo "$name"
          }

          format_number() {
            local num=$1
            [ -z "$num" ] || [ "$num" = "null" ] && echo "0" && return
            [ "$num" -gt 1000000 ] 2>/dev/null && echo "$(echo "scale=1; $num/1000000" | bc)M" && return
            [ "$num" -gt 1000 ] 2>/dev/null && echo "$(echo "scale=1; $num/1000" | bc)K" && return
            echo "$num"
          }

          notify_oversized() {
            local fname="$1" fsize="$2" url="$3"
            local fsize_mb=$(( fsize / 1024 / 1024 ))
            local caption="вҡ пёҸ *ЩҒШ§ЫҢЩ„ ШЁЫҢШҙШӘШұ Ш§ШІ ЫҙЫө Щ…ЪҜШ§ШЁШ§ЫҢШӘ Ш§ШіШӘ!*\n\nрҹ“Ғ *ЩҶШ§Щ…:* ${fname}\nрҹ“Ұ *ШӯШ¬Щ…:* ${fsize_mb}MB\nрҹ”— *Щ„ЫҢЩҶЪ©:* ${url}\n\nвқҢ Ш§Щ…Ъ©Ш§ЩҶ ШҜШ§ЩҶЩ„ЩҲШҜ ШҜШұ ЩҶШіШ®ЩҮ ШұШ§ЫҢЪҜШ§ЩҶ ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ.\nвӯҗ ШЁШ§ Ш®ШұЫҢШҜ Ш§ШҙШӘШұШ§Ъ© ЩҫШұЫҢЩ…ЫҢЩҲЩ… Щ…ШӯШҜЩҲШҜЫҢШӘ ШӯШ¬Щ… ШЁШұШҜШ§ШҙШӘЩҮ Щ…ЫҢШҙЩҲШҜ."
            local kb='{"inline_keyboard":[[{"text":"рҹ”ҷ ШЁШ§ШІЪҜШҙШӘ ШЁЩҮ Щ…ЩҶЩҲЫҢ Ш§ШөЩ„ЫҢ","callback_data":"back_to_main"}]]}'
            curl -s -X POST "${BALE_API}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":$(echo "$caption" | jq -Rsc '.'),\"parse_mode\":\"Markdown\",\"reply_markup\":${kb}}" > /dev/null 2>&1
          }

          notify_multipart_info() {
            local fname="$1" total_parts="$2" url="$3"
            local caption="рҹ“Ұ *ЩҒШ§ЫҢЩ„ ШЁЩҮ ${total_parts} ЩҫШ§ШұШӘ ЫҙЫөMB ШӘЩӮШіЫҢЩ… ШҙШҜ.*\n\nрҹ“Ғ *ЩҶШ§Щ…:* ${fname}\nрҹ“Ҙ ЩҮЩ…ЩҮ ЩҫШ§ШұШӘвҖҢЩҮШ§ ШұШ§ ШҜШ§ЩҶЩ„ЩҲШҜ Ъ©ЩҶЫҢШҜШҢ ШіЩҫШі *ЩҫШ§ШұШӘ Ыұ* ШұШ§ Extract Ъ©ЩҶЫҢШҜ.\n\nрҹ”— *Щ„ЫҢЩҶЪ©:* ${url}"
            local kb='{"inline_keyboard":[[{"text":"рҹ”ҷ ШЁШ§ШІЪҜШҙШӘ ШЁЩҮ Щ…ЩҶЩҲЫҢ Ш§ШөЩ„ЫҢ","callback_data":"back_to_main"}]]}'
            curl -s -X POST "${BALE_API}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":$(echo "$caption" | jq -Rsc '.'),\"parse_mode\":\"Markdown\",\"reply_markup\":${kb}}" > /dev/null 2>&1
          }

          notify_cache() {
            local platform="$1" url="$2" quality="$3" file_id="$4" channel_id="$5" message_id="$6" file_size="$7" file_name="$8" is_multipart="$9" total_parts="${10}"
            curl -s -X POST "${BALE_API}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${ADMIN_ID}\",\"text\":\"/cache ${platform} ${url} ${quality} ${file_id} ${channel_id} ${message_id} ${file_size} ${file_name} ${is_multipart} ${total_parts}\"}" > /dev/null 2>&1
            echo "  рҹ“Ө Cache notification sent"
          }

          read -ra URL_ARRAY <<< "$IG_URLS"

          for IG_URL in "${URL_ARRAY[@]}"; do

          echo "рҹ”Қ Fetching metadata: $IG_URL"
          INFO_JSON=$(yt-dlp --proxy "socks5://127.0.0.1:1080" --dump-json --skip-download "$IG_URL" 2>/dev/null || echo "{}")

          USERNAME=$(echo "$INFO_JSON" | jq -r '.uploader // .channel // "Unknown User"')
          TITLE=$(echo "$INFO_JSON" | jq -r '.title // .description // "Untitled"')
          LIKE_COUNT=$(echo "$INFO_JSON" | jq -r '.like_count // 0')
          THUMBNAIL_URL=$(echo "$INFO_JSON" | jq -r '.thumbnail // ""')

          echo "  рҹ‘Ө $USERNAME | рҹ“қ $TITLE | вқӨпёҸ $(format_number $LIKE_COUNT)"

          TMP_DIR="tmp_ig_$$"
          mkdir -p "$TMP_DIR"

          # Download вҖ” single method (like YouTube but simpler)
          yt-dlp --proxy "socks5://127.0.0.1:1080" \
            --format "$FORMAT" \
            --merge-output-format mp4 \
            --write-thumbnail --convert-thumbnails jpg \
            --no-cache-dir \
            --output "${TMP_DIR}/%(title)s.%(ext)s" \
            --no-part $PLAYLIST_FLAG \
            --retries 5 --fragment-retries 5 --no-check-certificates \
            --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M \
            --progress --newline "$IG_URL" 2>&1 || {
            echo "  рҹ”„ Retry without proxy..."
            yt-dlp --format "$FORMAT" \
              --merge-output-format mp4 \
              --write-thumbnail --convert-thumbnails jpg \
              --no-cache-dir \
              --output "${TMP_DIR}/%(title)s.%(ext)s" \
              --no-part $PLAYLIST_FLAG \
              --retries 5 --fragment-retries 5 --no-check-certificates \
              --concurrent-fragments 8 --progress --newline "$IG_URL" 2>&1
          }

          # Process files вҖ” exactly like YouTube
          for MEDIA_FILE in "$TMP_DIR"/*.mp4 "$TMP_DIR"/*.webm "$TMP_DIR"/*.mkv; do
            [ -f "$MEDIA_FILE" ] || continue

            BASENAME=$(basename "$MEDIA_FILE")
            SAFE_NAME=$(sanitize_name "${BASENAME%.*}")
            EXT="${BASENAME##*.}"
            FILE_SIZE=$(stat -c%s "$MEDIA_FILE" 2>/dev/null || echo 0)

            echo "  рҹ“Ұ ${SAFE_NAME}.${EXT} вҖ” $(( FILE_SIZE / 1024 / 1024 ))MB"

            # в•җв•җв•җ SIZE CHECK в•җв•җв•җ
            if [ "$FILE_SIZE" -gt "$TARGET_SIZE_BYTES" ]; then
              if [ "$IS_PREMIUM" = "true" ]; then
                echo "  вӯҗ Premium user вҖ” splitting with RAR..."
                SPLIT_DIR="/tmp/rar_split_$$"
                mkdir -p "$SPLIT_DIR"
                cp "$MEDIA_FILE" "${SPLIT_DIR}/${SAFE_NAME}.${EXT}"
                cd "$SPLIT_DIR"
                rar a -v${TARGET_SIZE_MB}m -ep1 -m0 -idq "${SAFE_NAME}.part.rar" "${SAFE_NAME}.${EXT}"
                rm -f "${SAFE_NAME}.${EXT}"
                cd - > /dev/null

                TOTAL_PARTS=$(ls "${SPLIT_DIR}/${SAFE_NAME}.part"*.rar 2>/dev/null | wc -l)
                if [ "$TOTAL_PARTS" -gt "$MAX_PARTS" ]; then
                  echo "  вҡ пёҸ Too many parts (${TOTAL_PARTS}) вҖ” rejecting"
                  [ -n "$CHAT_ID" ] && notify_oversized "${SAFE_NAME}.${EXT}" "$FILE_SIZE" "$IG_URL"
                  rm -rf "$SPLIT_DIR"
                  continue
                fi

                echo "  рҹ“Ұ Split into ${TOTAL_PARTS} RAR parts"
                PART_NUM=0
                FIRST_MESSAGE_ID=0
                FIRST_FILE_ID=""

                for PART_FILE in $(ls "${SPLIT_DIR}/${SAFE_NAME}.part"*.rar | sort); do
                  [ -f "$PART_FILE" ] || continue
                  PART_NUM=$((PART_NUM + 1))
                  PART_NAME=$(basename "$PART_FILE")
                  echo "  рҹ“Ө Uploading part ${PART_NUM}/${TOTAL_PARTS}: ${PART_NAME}"
                  UPLOAD_RESPONSE=$(curl -s -X POST "${BALE_API}/sendDocument" \
                    -F "chat_id=${CHANNEL_ID}" -F "document=@${PART_FILE}" -F "caption=")
                  MESSAGE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.message_id // 0')
                  FILE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.document.file_id // ""')
                  [ "$PART_NUM" -eq 1 ] && { FIRST_MESSAGE_ID=$MESSAGE_ID; FIRST_FILE_ID=$FILE_ID; }
                  [ "$MESSAGE_ID" != "0" ] && echo "    вң… Part ${PART_NUM} uploaded (msg_id: ${MESSAGE_ID})" || echo "    вқҢ Part ${PART_NUM} upload failed"
                  sleep 2
                done

                [ -n "$CHAT_ID" ] && [ -n "$FIRST_FILE_ID" ] && [ "$FIRST_MESSAGE_ID" != "0" ] && \
                  notify_cache "instagram" "$IG_URL" "$QUALITY" "$FIRST_FILE_ID" "${CHANNEL_ID}" "$FIRST_MESSAGE_ID" "$FILE_SIZE" "${SAFE_NAME}.${EXT}" "1" "$TOTAL_PARTS"
                [ -n "$CHAT_ID" ] && notify_multipart_info "${SAFE_NAME}.${EXT}" "$TOTAL_PARTS" "$IG_URL"
                rm -rf "$SPLIT_DIR"
              else
                echo "  вҡ пёҸ Free user вҖ” >45MB rejected"
                [ -n "$CHAT_ID" ] && notify_oversized "${SAFE_NAME}.${EXT}" "$FILE_SIZE" "$IG_URL"
              fi
            else
              # в•җв•җв•җ вүӨ45MB: Direct upload в•җв•җв•җ
              if [ -n "$CHANNEL_ID" ]; then
                UPLOAD_RESPONSE=$(curl -s -X POST "${BALE_API}/sendVideo" \
                  -F "chat_id=${CHANNEL_ID}" -F "video=@${MEDIA_FILE}" -F "caption=")
                FILE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.video.file_id // ""')
                MESSAGE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.message_id // 0')

                if [ -n "$FILE_ID" ] && [ "$MESSAGE_ID" != "0" ]; then
                  echo "  вң… Uploaded (msg_id: $MESSAGE_ID)"
                  [ -n "$CHAT_ID" ] && notify_cache "instagram" "$IG_URL" "$QUALITY" "$FILE_ID" "${CHANNEL_ID}" "$MESSAGE_ID" "$FILE_SIZE" "${SAFE_NAME}.${EXT}" "0" "1"
                else
                  echo "  вқҢ Upload failed: $UPLOAD_RESPONSE"
                fi
                sleep 2
              fi
            fi
          done

          rm -rf "$TMP_DIR"

          echo "USERNAME=${USERNAME}" >> $GITHUB_ENV
          echo "TRACK_TITLE=${TITLE}" >> $GITHUB_ENV
          echo "LIKE_COUNT=${LIKE_COUNT}" >> $GITHUB_ENV
          echo "THUMBNAIL_URL=${THUMBNAIL_URL}" >> $GITHUB_ENV

          done

          echo "вң… All URLs processed"

      - name: "рҹӣ‘ Stop WARP"
        if: always()
        run: |
          docker stop warp 2>/dev/null || true
          docker rm warp 2>/dev/null || true

      - name: "рҹ“¬ Send Complete Result"
        if: github.event.inputs.chat_id != ''
        env:
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          IG_URLS: ${{ env.IG_URLS }}
          USERNAME: ${{ env.USERNAME }}
          TRACK_TITLE: ${{ env.TRACK_TITLE }}
          LIKE_COUNT: ${{ env.LIKE_COUNT }}
          THUMBNAIL_URL: ${{ env.THUMBNAIL_URL }}
          CHANNEL_ID: ${{ github.event.inputs.channel_id }}
          CHANNEL_USERNAME: ${{ github.event.inputs.channel_username }}
        run: |
          #!/bin/bash
          BALE_API="https://tapi.bale.ai/bot${BALE_TOKEN}"
          CHAT_ID="${CHAT_ID}"
          USER_NAME="${USERNAME:-Unknown}"
          TITLE_NAME="${TRACK_TITLE:-Untitled}"
          THUMB_URL="${THUMBNAIL_URL:-}"
          LIKE_VAL="${LIKE_COUNT:-0}"

          if [ "$LIKE_VAL" != "0" ] && [ "$LIKE_VAL" != "null" ] && [ "$LIKE_VAL" -gt 0 ] 2>/dev/null; then
            if [ "$LIKE_VAL" -gt 1000000 ]; then LIKES_FMT="$(echo "scale=1; $LIKE_VAL/1000000" | bc)M"
            elif [ "$LIKE_VAL" -gt 1000 ]; then LIKES_FMT="$(echo "scale=1; $LIKE_VAL/1000" | bc)K"
            else LIKES_FMT="$LIKE_VAL"; fi
          else
            LIKES_FMT="вҖ”"
          fi

          if [ -n "$CHANNEL_USERNAME" ]; then
            CHANNEL_LINK="https://ble.ir/${CHANNEL_USERNAME}"
          elif [ -n "$CHANNEL_ID" ]; then
            CHANNEL_LINK="https://ble.ir/im/p/${CHANNEL_ID}"
          else
            CHANNEL_LINK="https://ble.ir"
          fi

          CAPTION="рҹ“ё *${TITLE_NAME}*

          рҹ‘Ө *Ъ©Ш§ШұШЁШұ:* ${USER_NAME}
          вқӨпёҸ *Щ„Ш§ЫҢЪ©:* ${LIKES_FMT}

          вң… *ШҜШ§ЩҶЩ„ЩҲШҜ Ъ©Ш§Щ…Щ„ ШҙШҜ!*
          рҹ“Ғ ЩҒШ§ЫҢЩ„ ШҜШұ Ъ©Ш§ЩҶШ§Щ„ ШўШұШҙЫҢЩҲ ШҙЩ…Ш§ Ш°Ш®ЫҢШұЩҮ ШҙШҜ.

          рҹ”— [Щ…ШҙШ§ЩҮШҜЩҮ ШҜШұ Instagram](${IG_URLS})"

          KEYBOARD='{"inline_keyboard":[[{"text":"рҹ“Ӯ ШҜШұЫҢШ§ЩҒШӘ ЩҒШ§ЫҢЩ„ Ш§ШІ Ъ©Ш§ЩҶШ§Щ„ ШўШұШҙЫҢЩҲ","url":"'"${CHANNEL_LINK}"'"}],[{"text":"рҹ”ҷ ШЁШ§ШІЪҜШҙШӘ ШЁЩҮ Щ…ЩҶЩҲЫҢ Ш§ШөЩ„ЫҢ","callback_data":"back_to_main"}]]}'
          ESCAPED_CAPTION=$(echo "$CAPTION" | jq -Rsc '.')

          if [ -n "$THUMB_URL" ] && [ "$THUMB_URL" != "null" ]; then
            PHOTO_RESULT=$(curl -s -X POST "${BALE_API}/sendPhoto" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"photo\":\"${THUMB_URL}\",\"caption\":${ESCAPED_CAPTION},\"parse_mode\":\"Markdown\",\"reply_markup\":${KEYBOARD}}")
            if ! echo "$PHOTO_RESULT" | jq -e '.ok == true' > /dev/null 2>&1; then
              curl -s -X POST "${BALE_API}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":${ESCAPED_CAPTION},\"parse_mode\":\"Markdown\",\"reply_markup\":${KEYBOARD}}" > /dev/null 2>&1
            fi
          else
            curl -s -X POST "${BALE_API}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":${ESCAPED_CAPTION},\"parse_mode\":\"Markdown\",\"reply_markup\":${KEYBOARD}}" > /dev/null 2>&1
          fi

          echo "вң… Result sent to user"
