# ============================================================
# facebook-dl.yml — Bale Facebook Downloader V2
# Repository: github.com/khashayarone/DownloadHub
# ============================================================
# Features V2:
#   ۱. Download videos from Facebook (Watch, Reels, posts)
#   ۲. Auto-organize by page/creator name (folder = page slug)
#   ۳. Cache system — instant skip if already downloaded
#   ۴. Quality mapping: 720→best, 480→medium
#   ۵. Metadata embedding + thumbnail artwork
#   ۶. Rich page info in page_info.json
#   ۷. Auto-generated README.md per page with stats
#   ۸. Combined single message (thumbnail + caption + channel link + back button)
#   ۹. Video via sendVideo / text post via sendMessage to archive channel
#   ۱۰. Text post detection — extract & send text separately
#   ۱۱. 2 download methods (WARP proxy + direct fallback)
#   ۱۲. Multi-URL input support
#   ۱۳. Compatible with Bale DownloadHub Bot v3
# ============================================================

name: "📘 Facebook Downloader"

on:
  workflow_dispatch:
    inputs:
      facebook_urls:
        description: "🔗 Facebook URL(s) — separate with space"
        required: true
        type: string
      quality:
        description: "📹 Video Quality (720=best, 480=medium)"
        required: false
        type: choice
        default: "720"
        options:
          - "720"
          - "480"
      download_type:
        description: "📋 Download Type"
        required: false
        type: choice
        default: "single"
        options:
          - single
          - all_videos
      max_items:
        description: "🔢 Max Items (for all_videos)"
        required: false
        type: string
        default: "10"
      chat_id:
        description: "🆔 User Chat ID for notification"
        required: false
        type: string
        default: ""
      channel_id:
        description: "📢 Channel ID for archiving"
        required: false
        type: string
        default: ""
      channel_username:
        description: "📢 Channel Username"
        required: false
        type: string
        default: ""

env:
  PROJECT_NAME: "Khashayar Downloader"
  PROJECT_URL: "https://khashayar.one"
  PLATFORM: "facebook"

jobs:
  download:
    name: "📘 Download & Store"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      actions: read

    steps:
      # ── Step 1: Checkout ──────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── Step 2: Git Config ────────────────────────────
      - name: "⚙️ Configure Git"
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Step 3: Cloudflare WARP ───────────────────────
      - name: "🌐 Setup Cloudflare WARP"
        run: |
          docker network create warp-net 2>/dev/null || true
          docker run -d \
            --name warp --restart=no --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp:latest
          sleep 15
          for i in $(seq 1 5); do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then echo "✅ WARP active!"; break; else sleep 5; fi
          done

      # ── Step 4: Dependencies ───────────────────────────
      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip ffmpeg zip curl jq bc unzip
          pip3 install --upgrade yt-dlp --quiet

      # ── Step 5: Setup Parameters ──────────────────────
      - name: "🔧 Setup Download Parameters"
        id: setup
        env:
          FB_URLS: ${{ github.event.inputs.facebook_urls }}
          FB_QUALITY: ${{ github.event.inputs.quality }}
          FB_TYPE: ${{ github.event.inputs.download_type }}
          FB_MAX: ${{ github.event.inputs.max_items }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          FB_URLS="${FB_URLS}"
          QUALITY="${FB_QUALITY}"
          DOWNLOAD_TYPE="${FB_TYPE}"
          MAX_ITEMS="${FB_MAX}"
          BRANCH="${BRANCH}"
          
          echo "════════════════════════════════════════"
          echo "  $PROJECT_NAME | $PROJECT_URL"
          echo "════════════════════════════════════════"
          echo "📘 URLs: ${FB_URLS}"
          echo "📹 Quality: ${QUALITY}"
          echo "📋 Type: ${DOWNLOAD_TYPE} | Max: ${MAX_ITEMS}"
          echo "🌿 Branch: ${BRANCH}"
          
          echo "FB_URLS=${FB_URLS}" >> $GITHUB_ENV
          echo "QUALITY=${QUALITY}" >> $GITHUB_ENV
          echo "DOWNLOAD_TYPE=${DOWNLOAD_TYPE}" >> $GITHUB_ENV
          echo "MAX_ITEMS=${MAX_ITEMS}" >> $GITHUB_ENV
          echo "BRANCH=${BRANCH}" >> $GITHUB_ENV
          echo "REPO_DIR=${GITHUB_WORKSPACE}" >> $GITHUB_ENV
          echo "BACKUP_DIR=/tmp/fb_downloads_$$" >> $GITHUB_ENV
          echo "CACHE_INDEX=${GITHUB_WORKSPACE}/facebook/cache_index.json" >> $GITHUB_ENV
          
          mkdir -p /tmp/fb_downloads_$$
          mkdir -p "${GITHUB_WORKSPACE}/facebook"
          
          if [ ! -f "${GITHUB_WORKSPACE}/facebook/cache_index.json" ]; then
            echo '{}' > "${GITHUB_WORKSPACE}/facebook/cache_index.json"
          fi
          
          # Quality mapping: 720 → best, 480 → medium
          case "${QUALITY}" in
            720)   FORMAT="best/bestvideo+bestaudio/best" ;;
            480)   FORMAT="best[height<=720]/bestvideo[height<=720]+bestaudio/best" ;;
            *)     FORMAT="best/bestvideo+bestaudio/best" ;;
          esac
          echo "FORMAT=${FORMAT}" >> $GITHUB_ENV
          
          if [ "$DOWNLOAD_TYPE" = "all_videos" ]; then
            PLAYLIST_FLAG="--yes-playlist --playlist-end ${MAX_ITEMS}"
          else
            PLAYLIST_FLAG="--no-playlist"
          fi
          echo "PLAYLIST_FLAG=${PLAYLIST_FLAG}" >> $GITHUB_ENV
          
          echo "✅ Setup complete"

      # ═══════════════════════════════════════════════════
      # Step 6: Cache Check
      # ═══════════════════════════════════════════════════
      - name: "🔍 Cache Check"
        id: cache_check
        run: |
          #!/bin/bash
          FB_URLS="${{ env.FB_URLS }}"
          CACHE_INDEX="${{ env.CACHE_INDEX }}"
          REPO_DIR="${{ env.REPO_DIR }}"
          VIDEO_ID=$(echo "$FB_URLS" | grep -oE '[0-9]{10,20}' | head -1 || echo "")
          if [ -n "$VIDEO_ID" ]; then
            CACHED_PATH=$(jq -r ".\"${VIDEO_ID}\".path // empty" "$CACHE_INDEX" 2>/dev/null || echo "")
            if [ -n "$CACHED_PATH" ] && [ -f "${REPO_DIR}/${CACHED_PATH}" ]; then
              echo "✅ ALREADY CACHED: ${CACHED_PATH}"
              echo "CACHE_HIT=true" >> $GITHUB_ENV
              echo "CACHED_FILE=${CACHED_PATH}" >> $GITHUB_ENV
              echo "CACHED_PAGE=$(jq -r ".\"${VIDEO_ID}\".page // \"Unknown\"" "$CACHE_INDEX")" >> $GITHUB_ENV
              echo "CACHED_TITLE=$(jq -r ".\"${VIDEO_ID}\".title // \"Unknown\"" "$CACHE_INDEX")" >> $GITHUB_ENV
              echo "CACHED_THUMB=$(jq -r ".\"${VIDEO_ID}\".thumbnail // \"\"" "$CACHE_INDEX")" >> $GITHUB_ENV
              echo "CACHED_TEXT=$(jq -r ".\"${VIDEO_ID}\".text // \"\"" "$CACHE_INDEX")" >> $GITHUB_ENV
              echo "CACHED_MEDIA_TYPE=$(jq -r ".\"${VIDEO_ID}\".media_type // \"video\"" "$CACHE_INDEX")" >> $GITHUB_ENV
              echo "CACHED_VIEWS=$(jq -r ".\"${VIDEO_ID}\".views // 0" "$CACHE_INDEX")" >> $GITHUB_ENV
            else
              echo "🆕 Not in cache"
              echo "CACHE_HIT=false" >> $GITHUB_ENV
            fi
          else
            echo "⚠️ Could not extract video ID"
            echo "CACHE_HIT=false" >> $GITHUB_ENV
          fi

      # ═══════════════════════════════════════════════════
      # Step 7: Download & Process
      # ═══════════════════════════════════════════════════
      - name: "📘 Download & Process"
        id: download
        if: env.CACHE_HIT != 'true'
        env:
          BACKUP_DIR: ${{ env.BACKUP_DIR }}
          FORMAT: ${{ env.FORMAT }}
          PLAYLIST_FLAG: ${{ env.PLAYLIST_FLAG }}
          FB_URLS: ${{ env.FB_URLS }}
          REPO_DIR: ${{ env.REPO_DIR }}
          CACHE_INDEX: ${{ env.CACHE_INDEX }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          #!/bin/bash
          shopt -s nullglob
          set -e
          
          sanitize_name() {
            local name="$1"
            name=$(echo "$name" | sed 's/[()（）]/_/g' | sed 's/[][{}\/\\<>|:;'"'"'"]/_/g')
            name=$(echo "$name" | tr '[:space:]｜　' '-' | tr -c 'a-zA-Z0-9_-' '-' | tr -s '-' | sed 's/^-//;s/-$//')
            [ -z "$name" ] && name="unknown"
            echo "$name"
          }
          
          format_number() {
            local num=$1
            if [ -z "$num" ] || [ "$num" = "null" ]; then echo "0"; return; fi
            if [ "$num" -gt 1000000 ] 2>/dev/null; then echo "$(echo "scale=1; $num / 1000000" | bc)M"
            elif [ "$num" -gt 1000 ] 2>/dev/null; then echo "$(echo "scale=1; $num / 1000" | bc)K"
            else echo "$num"; fi
          }
          
          truncate_text() {
            local text="$1"
            local max_len="${2:-300}"
            if [ ${#text} -gt $max_len ]; then
              echo "${text:0:$max_len}..."
            else
              echo "$text"
            fi
          }
          
          read -ra URL_ARRAY <<< "$FB_URLS"
          TOTAL_URLS=${#URL_ARRAY[@]}
          
          for FB_URL in "${URL_ARRAY[@]}"; do
          
          echo "🔍 Fetching metadata for: $FB_URL"
          
          INFO_JSON=$(yt-dlp --proxy "socks5://127.0.0.1:1080" --dump-json --skip-download "$FB_URL" 2>/dev/null || echo "{}")
          
          PAGE_NAME=$(echo "$INFO_JSON" | jq -r '.uploader // .channel // "Unknown Page"')
          TITLE=$(echo "$INFO_JSON" | jq -r '.title // .description // "Untitled"')
          VIDEO_ID=$(echo "$INFO_JSON" | jq -r '.id // ""')
          DURATION=$(echo "$INFO_JSON" | jq -r '.duration // 0')
          VIEW_COUNT=$(echo "$INFO_JSON" | jq -r '.view_count // 0')
          LIKE_COUNT=$(echo "$INFO_JSON" | jq -r '.like_count // 0')
          COMMENT_COUNT=$(echo "$INFO_JSON" | jq -r '.comment_count // 0')
          THUMBNAIL_URL=$(echo "$INFO_JSON" | jq -r '.thumbnail // ""')
          POST_TEXT=$(echo "$INFO_JSON" | jq -r '.description // ""')
          MEDIA_EXT=$(echo "$INFO_JSON" | jq -r '.ext // ""')
          
          # Detect media type
          if echo "$INFO_JSON" | jq -e '.formats' > /dev/null 2>&1; then
            HAS_VIDEO=$(echo "$INFO_JSON" | jq -r '.formats[]?.vcodec // ""' | grep -v 'none' | head -1)
            if [ -n "$HAS_VIDEO" ]; then
              MEDIA_TYPE="video"
            else
              MEDIA_TYPE="photo"
            fi
          elif [ -n "$POST_TEXT" ] && [ "$POST_TEXT" != "null" ] && [ ${#POST_TEXT} -gt 10 ]; then
            MEDIA_TYPE="text"
          else
            MEDIA_TYPE="unknown"
          fi
          
          echo "  📄 Page: $PAGE_NAME"
          echo "  📝 Title: $TITLE"
          echo "  📹 Media Type: $MEDIA_TYPE"
          
          PAGE_SLUG=$(sanitize_name "$PAGE_NAME")
          ITEM_SLUG=$(sanitize_name "$TITLE")
          
          PAGE_DIR="${REPO_DIR}/facebook/${PAGE_SLUG}"
          mkdir -p "$PAGE_DIR"
          
          printf '{\n  "page_name": "%s",\n  "page_url": "%s",\n  "total_views": %s,\n  "total_likes": %s,\n  "total_comments": %s,\n  "last_updated": "%s"\n}\n' \
            "$PAGE_NAME" \
            "$(echo "$INFO_JSON" | jq -r '.uploader_url // ""')" \
            "${VIEW_COUNT:-0}" \
            "${LIKE_COUNT:-0}" \
            "${COMMENT_COUNT:-0}" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > "${PAGE_DIR}/page_info.json"
          echo "  📝 Updated page_info.json"
          
          # Save post text
          if [ -n "$POST_TEXT" ] && [ "$POST_TEXT" != "null" ]; then
            echo "$POST_TEXT" > "${PAGE_DIR}/${ITEM_SLUG}_post.txt"
            echo "  📝 Saved post text: ${ITEM_SLUG}_post.txt"
          fi
          
          # For text-only posts: skip download, save metadata
          if [ "$MEDIA_TYPE" = "text" ]; then
            echo "  📝 Text-only post — saving text, skipping media download"
            
            printf '{\n  "title": "%s",\n  "page_name": "%s",\n  "post_text": %s,\n  "views": %s,\n  "likes": %s,\n  "comments": %s,\n  "media_type": "text",\n  "post_url": "%s"\n}\n' \
              "$TITLE" "$PAGE_NAME" "$(echo "$POST_TEXT" | jq -Rsc '.')" \
              "${VIEW_COUNT:-0}" "${LIKE_COUNT:-0}" "${COMMENT_COUNT:-0}" \
              "$FB_URL" \
              > "${PAGE_DIR}/${ITEM_SLUG}_info.json"
            echo "  📋 Saved post info: ${ITEM_SLUG}_info.json"
            
            echo "PAGE_NAME=${PAGE_NAME}" >> $GITHUB_ENV
            echo "PAGE_SLUG=${PAGE_SLUG}" >> $GITHUB_ENV
            echo "TRACK_TITLE=${TITLE}" >> $GITHUB_ENV
            echo "ITEM_COUNT=0" >> $GITHUB_ENV
            echo "VIDEO_ID=${VIDEO_ID}" >> $GITHUB_ENV
            echo "DURATION=0" >> $GITHUB_ENV
            echo "THUMBNAIL_URL=${THUMBNAIL_URL}" >> $GITHUB_ENV
            echo "VIEW_COUNT=${VIEW_COUNT}" >> $GITHUB_ENV
            echo "MEDIA_TYPE=${MEDIA_TYPE}" >> $GITHUB_ENV
            echo "POST_TEXT=${POST_TEXT}" >> $GITHUB_ENV
            continue
          fi
          
          # ═══════════════════════════════════════════
          # Download media
          # ═══════════════════════════════════════════
          TMP_DIR="tmp_fb_$$"
          mkdir -p "$TMP_DIR"
          echo "⬇️ Downloading media: $TITLE"
          
          yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" \
            --merge-output-format mp4 --write-thumbnail --no-cache-dir \
            --output "${TMP_DIR}/%(title)s.%(ext)s" --no-part $PLAYLIST_FLAG \
            --retries 5 --fragment-retries 5 --no-check-certificates \
            --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M \
            --progress --newline "$FB_URL" 2>&1 || {
            echo "  🔄 Retry without proxy..."
            yt-dlp --format "$FORMAT" --merge-output-format mp4 --write-thumbnail \
              --no-cache-dir --output "${TMP_DIR}/%(title)s.%(ext)s" --no-part $PLAYLIST_FLAG \
              --retries 5 --fragment-retries 5 --no-check-certificates \
              --concurrent-fragments 8 --progress --newline "$FB_URL" 2>&1
          }
          
          ITEM_COUNT=0
          for MEDIA_FILE in "$TMP_DIR"/*; do
            [ -f "$MEDIA_FILE" ] || continue
            [[ "$MEDIA_FILE" == *.jpg ]] && continue
            
            BASENAME=$(basename "$MEDIA_FILE")
            FILENAME_NO_EXT="${BASENAME%.*}"
            SAFE_NAME=$(sanitize_name "$FILENAME_NO_EXT")
            EXT="${BASENAME##*.}"
            
            FILE_SIZE=$(stat -c%s "$MEDIA_FILE" 2>/dev/null || echo 0)
            MAX_SIZE=$(( 2048 * 1024 * 1024 ))
            if [ "$FILE_SIZE" -gt "$MAX_SIZE" ]; then
              echo "  ⚠️ File too large — skipping"; continue
            fi
            
            cp "$MEDIA_FILE" "${PAGE_DIR}/${SAFE_NAME}.${EXT}"
            echo "  📦 Saved: facebook/${PAGE_SLUG}/${SAFE_NAME}.${EXT}"
            
            mkdir -p "${BACKUP_DIR}/${PAGE_SLUG}"
            cp "$MEDIA_FILE" "${BACKUP_DIR}/${PAGE_SLUG}/${SAFE_NAME}.${EXT}"
            ITEM_COUNT=$((ITEM_COUNT + 1))
            
            THUMB_FILE=$(ls "$TMP_DIR"/*.jpg 2>/dev/null | head -1)
            if [ -n "$THUMB_FILE" ] && [ -f "$THUMB_FILE" ]; then
              cp "$THUMB_FILE" "${PAGE_DIR}/${SAFE_NAME}.jpg" 2>/dev/null
              cp "$THUMB_FILE" "${BACKUP_DIR}/${PAGE_SLUG}/${SAFE_NAME}.jpg" 2>/dev/null
            fi
            
            CACHE_ENTRY=$(jq -n --arg path "facebook/${PAGE_SLUG}/${SAFE_NAME}.${EXT}" \
              --arg page "$PAGE_NAME" --arg title "$TITLE" \
              --arg text "$(echo "$POST_TEXT" | cut -c1-500)" \
              --arg media_type "$MEDIA_TYPE" \
              --arg thumbnail "$THUMBNAIL_URL" \
              --argjson views "${VIEW_COUNT:-0}" \
              '{path: $path, page: $page, title: $title, text: $text, media_type: $media_type, thumbnail: $thumbnail, views: $views, cached_at: "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}')
            jq --arg id "$VIDEO_ID" --argjson entry "$CACHE_ENTRY" '. + {($id): $entry}' "$CACHE_INDEX" > /tmp/cache_tmp.json
            mv /tmp/cache_tmp.json "$CACHE_INDEX"
            echo "  💾 Cached: $VIDEO_ID"
            
            printf '{\n  "title": "%s",\n  "page_name": "%s",\n  "post_text": %s,\n  "duration": %s,\n  "views": %s,\n  "likes": %s,\n  "comments": %s,\n  "media_type": "%s",\n  "thumbnail_url": "%s",\n  "post_url": "%s"\n}\n' \
              "$TITLE" "$PAGE_NAME" "$(echo "$POST_TEXT" | jq -Rsc '.')" \
              "${DURATION:-0}" "${VIEW_COUNT:-0}" "${LIKE_COUNT:-0}" \
              "${COMMENT_COUNT:-0}" "$MEDIA_TYPE" "$THUMBNAIL_URL" "$FB_URL" \
              > "${PAGE_DIR}/${SAFE_NAME}_info.json"
            echo "  📋 Saved media info: ${SAFE_NAME}_info.json"
          done
          
          # README for page
          ITEM_LIST=$(ls "${PAGE_DIR}"/*.mp4 "${PAGE_DIR}"/*.jpg "${PAGE_DIR}"/*.png 2>/dev/null | grep -v '_info\|_post\|page_info' | while read f; do
            bn=$(basename "$f"); echo "  📘 ${bn}"
          done)
          
          printf '# %s\n\n**Facebook:** [%s](%s)\n\n| Views | Likes | Comments |\n|-------|-------|----------|\n| %s | %s | %s |\n\n## Media\n\n%s\n\n*Downloaded via [khashayar.one](https://khashayar.one)*\n' \
            "$PAGE_NAME" "$PAGE_NAME" "$(echo "$INFO_JSON" | jq -r '.uploader_url // ""')" \
            "$(format_number $VIEW_COUNT)" "$(format_number $LIKE_COUNT)" "$(format_number $COMMENT_COUNT)" \
            "$(echo "$ITEM_LIST" | sed 's/^/  /')" \
            > "${PAGE_DIR}/README.md"
          echo "  📝 Updated README.md"
          
          rm -rf "$TMP_DIR"
          
          echo "PAGE_NAME=${PAGE_NAME}" >> $GITHUB_ENV
          echo "PAGE_SLUG=${PAGE_SLUG}" >> $GITHUB_ENV
          echo "TRACK_TITLE=${TITLE}" >> $GITHUB_ENV
          echo "ITEM_COUNT=${ITEM_COUNT}" >> $GITHUB_ENV
          echo "VIDEO_ID=${VIDEO_ID}" >> $GITHUB_ENV
          echo "DURATION=${DURATION}" >> $GITHUB_ENV
          echo "THUMBNAIL_URL=${THUMBNAIL_URL}" >> $GITHUB_ENV
          echo "VIEW_COUNT=${VIEW_COUNT}" >> $GITHUB_ENV
          echo "MEDIA_TYPE=${MEDIA_TYPE}" >> $GITHUB_ENV
          echo "POST_TEXT=${POST_TEXT}" >> $GITHUB_ENV
          echo "✅ Done: ${ITEM_COUNT} item(s) from this URL"
          
          done
          
          echo "✅ All URLs processed: ${TOTAL_URLS} total"

      # ── Step 8: Commit & Push ─────────────────────────
      - name: "📤 Commit to Repository"
        if: env.CACHE_HIT != 'true'
        env:
          PAGE_NAME: ${{ env.PAGE_NAME }}
          TRACK_TITLE: ${{ env.TRACK_TITLE }}
          REPO_DIR: ${{ env.REPO_DIR }}
          BRANCH: ${{ env.BRANCH }}
        run: |
          cd "$REPO_DIR"
          git add facebook/
          if git diff --staged --quiet; then
            echo "✅ No changes"
          else
            git commit -m "feat(facebook): add ${PAGE_NAME} — ${TRACK_TITLE}"
            git pull --rebase origin ${BRANCH} || true
            git push origin ${BRANCH}
            echo "✅ Pushed"
          fi

      # ── Step 9: Stop WARP ─────────────────────────────
      - name: "🛑 Stop WARP"
        if: always()
        run: |
          docker stop warp 2>/dev/null || true
          docker rm warp 2>/dev/null || true

      # ═══════════════════════════════════════════════════
      # Step 10: Send Combined Message (Media Info + Channel Link + Back Button)
      # ═══════════════════════════════════════════════════
      - name: "📬 Send Complete Result to User"
        if: github.event.inputs.chat_id != ''
        env:
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          FB_URLS: ${{ env.FB_URLS }}
          PAGE_NAME: ${{ env.PAGE_NAME }}
          TRACK_TITLE: ${{ env.TRACK_TITLE }}
          DURATION: ${{ env.DURATION }}
          VIEW_COUNT: ${{ env.VIEW_COUNT }}
          THUMBNAIL_URL: ${{ env.THUMBNAIL_URL }}
          MEDIA_TYPE: ${{ env.MEDIA_TYPE }}
          POST_TEXT: ${{ env.POST_TEXT }}
          CHANNEL_ID: ${{ github.event.inputs.channel_id }}
          CHANNEL_USERNAME: ${{ github.event.inputs.channel_username }}
          CACHE_HIT: ${{ env.CACHE_HIT }}
          CACHED_PAGE: ${{ env.CACHED_PAGE }}
          CACHED_TITLE: ${{ env.CACHED_TITLE }}
          CACHED_THUMB: ${{ env.CACHED_THUMB }}
          CACHED_TEXT: ${{ env.CACHED_TEXT }}
          CACHED_MEDIA_TYPE: ${{ env.CACHED_MEDIA_TYPE }}
          CACHED_VIEWS: ${{ env.CACHED_VIEWS }}
          ITEM_COUNT: ${{ env.ITEM_COUNT }}
        run: |
          #!/bin/bash
          BALE_API_URL="https://tapi.bale.ai/bot${BALE_TOKEN}"
          
          # ── Determine which data to use (cache vs fresh) ──
          if [ "$CACHE_HIT" = "true" ]; then
            PAGE_NAME_VAL="${CACHED_PAGE:-Unknown}"
            TITLE_NAME="${CACHED_TITLE:-Untitled}"
            THUMB_URL="${CACHED_THUMB:-}"
            DURATION_VAL="0"
            VIEW_VAL="${CACHED_VIEWS:-0}"
            MEDIA_TYPE_VAL="${CACHED_MEDIA_TYPE:-video}"
            POST_TEXT_VAL="${CACHED_TEXT:-}"
            ITEM_COUNT_VAL="1"
            SPEED_TEXT="⚡ از حافظه کش ارسال شد | "
          else
            PAGE_NAME_VAL="${PAGE_NAME:-Unknown}"
            TITLE_NAME="${TRACK_TITLE:-Untitled}"
            THUMB_URL="${THUMBNAIL_URL:-}"
            DURATION_VAL="${DURATION:-0}"
            VIEW_VAL="${VIEW_COUNT:-0}"
            MEDIA_TYPE_VAL="${MEDIA_TYPE:-video}"
            POST_TEXT_VAL="${POST_TEXT:-}"
            ITEM_COUNT_VAL="${ITEM_COUNT:-0}"
            SPEED_TEXT=""
          fi
          
          # ── Format duration ──
          if [ "$DURATION_VAL" -gt 0 ] 2>/dev/null; then
            DUR_MIN=$(( DURATION_VAL / 60 ))
            DUR_REM=$(( DURATION_VAL % 60 ))
            DUR_FMT="${DUR_MIN}:$(printf '%02d' $DUR_REM)"
          else
            DUR_FMT="—"
          fi
          
          # ── Format views ──
          if [ "$VIEW_VAL" != "0" ] && [ "$VIEW_VAL" != "null" ] && [ "$VIEW_VAL" -gt 0 ] 2>/dev/null; then
            if [ "$VIEW_VAL" -gt 1000000 ]; then VIEWS_FMT="$(echo "scale=1; $VIEW_VAL / 1000000" | bc)M"
            elif [ "$VIEW_VAL" -gt 1000 ]; then VIEWS_FMT="$(echo "scale=1; $VIEW_VAL / 1000" | bc)K"
            else VIEWS_FMT="$VIEW_VAL"; fi
          else
            VIEWS_FMT="—"
          fi
          
          # ── Build channel link ──
          if [ -n "$CHANNEL_USERNAME" ]; then
            CHANNEL_LINK="https://ble.ir/${CHANNEL_USERNAME}"
          elif [ -n "$CHANNEL_ID" ]; then
            CHANNEL_LINK="https://ble.ir/im/p/${CHANNEL_ID}"
          else
            CHANNEL_LINK="https://ble.ir"
          fi
          
          # ── Truncate post text for preview ──
          TEXT_PREVIEW=""
          if [ -n "$POST_TEXT_VAL" ] && [ "$POST_TEXT_VAL" != "null" ]; then
            if [ ${#POST_TEXT_VAL} -gt 300 ]; then
              TEXT_PREVIEW="${POST_TEXT_VAL:0:300}..."
            else
              TEXT_PREVIEW="$POST_TEXT_VAL"
            fi
          fi
          
          # ── Build caption based on media type ──
          if [ "$MEDIA_TYPE_VAL" = "text" ]; then
            CAPTION="📘 *${TITLE_NAME}*
          
          📄 *صفحه:* ${PAGE_NAME_VAL}
          👁 *بازدید:* ${VIEWS_FMT}
          
          📝 *متن پست:*
          ${TEXT_PREVIEW}
          
          🔗 [مشاهده در Facebook](${FB_URLS})"
          else
            CAPTION="📘 *${TITLE_NAME}*
          
          📄 *صفحه:* ${PAGE_NAME_VAL}
          ⏱ *مدت:* ${DUR_FMT}  |  👁 *بازدید:* ${VIEWS_FMT}
          
          ✅ *دانلود کامل شد!* ${SPEED_TEXT}📘 *تعداد:* ${ITEM_COUNT_VAL}
          📁 فایل در کانال آرشیو شما ذخیره شد.
          
          🔗 [مشاهده در Facebook](${FB_URLS})"
          fi
          
          # ── Build keyboard with channel link + back button ──
          KEYBOARD=$(jq -n \
            --arg channel_url "$CHANNEL_LINK" \
            '{
              inline_keyboard: [
                [{text: "📂 دریافت فایل از کانال آرشیو", url: $channel_url}],
                [{text: "🔙 بازگشت به منوی اصلی", callback_data: "back_to_main"}]
              ]
            }')
          
          # Escape for JSON
          ESCAPED_CAPTION=$(echo "$CAPTION" | jq -R -s '.')
          ESCAPED_KEYBOARD=$(echo "$KEYBOARD" | jq -c '.')
          
          # ── Send as photo with caption (if thumbnail exists and not text-only) ──
          PHOTO_SENT=false
          if [ "$MEDIA_TYPE_VAL" != "text" ] && [ -n "$THUMB_URL" ] && [ "$THUMB_URL" != "null" ]; then
            echo "🖼️ Sending photo with caption via JSON..."
            PHOTO_RESPONSE=$(curl -s -X POST "${BALE_API_URL}/sendPhoto" \
              -H "Content-Type: application/json" \
              -d "{
                \"chat_id\": \"${CHAT_ID}\",
                \"photo\": \"${THUMB_URL}\",
                \"caption\": ${ESCAPED_CAPTION},
                \"parse_mode\": \"Markdown\",
                \"reply_markup\": ${ESCAPED_KEYBOARD}
              }")
            
            if echo "$PHOTO_RESPONSE" | jq -e '.ok == true' > /dev/null 2>&1; then
              PHOTO_SENT=true
              echo "  ✅ Photo sent successfully"
            else
              echo "  ⚠️ Photo failed, trying text fallback..."
            fi
          fi
          
          # ── Fallback: send as text message via JSON ──
          if [ "$PHOTO_SENT" = false ]; then
            echo "📝 Sending as text message via JSON..."
            TEXT_RESPONSE=$(curl -s -X POST "${BALE_API_URL}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{
                \"chat_id\": \"${CHAT_ID}\",
                \"text\": ${ESCAPED_CAPTION},
                \"parse_mode\": \"Markdown\",
                \"reply_markup\": ${ESCAPED_KEYBOARD}
              }")
            
            if echo "$TEXT_RESPONSE" | jq -e '.ok == true' > /dev/null 2>&1; then
              echo "  ✅ Text sent successfully"
            else
              echo "  ❌ Text also failed: $TEXT_RESPONSE"
            fi
          fi
          
          echo "✅ Complete result sent to user"

      # ═══════════════════════════════════════════════════
      # Step 11: Upload Media to Channel
      # ═══════════════════════════════════════════════════
      - name: "📤 Upload to User's Channel"
        if: github.event.inputs.channel_id != ''
        env:
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHANNEL_ID: ${{ github.event.inputs.channel_id }}
          BACKUP_DIR: ${{ env.BACKUP_DIR }}
          MEDIA_TYPE: ${{ env.MEDIA_TYPE }}
          CACHE_HIT: ${{ env.CACHE_HIT }}
          CACHED_FILE: ${{ env.CACHED_FILE }}
          REPO_DIR: ${{ env.REPO_DIR }}
        run: |
          #!/bin/bash
          BALE_API_URL="https://tapi.bale.ai/bot${BALE_TOKEN}"
          echo "📤 Uploading media to Bale channel..."
          
          if [ "$CACHE_HIT" = "true" ]; then
            FILE_PATH="${REPO_DIR}/${CACHED_FILE}"
            if [ ! -f "$FILE_PATH" ]; then
              echo "  ⚠️ Cached file not found — skipping"
              exit 0
            fi
            FILENAME=$(basename "$FILE_PATH")
            echo "  📄 Uploading from cache: $FILENAME"
            curl -s -X POST "${BALE_API_URL}/sendVideo" -F "chat_id=${CHANNEL_ID}" \
              -F "video=@${FILE_PATH}" -F "caption=" > /dev/null 2>&1
            echo "    ✅ Uploaded"
          else
            for PAGE_FOLDER in "$BACKUP_DIR"/*/ ; do
              [ -d "$PAGE_FOLDER" ] || continue
              PAGE_NAME_VAL=$(basename "$PAGE_FOLDER")
              for FILE in "$PAGE_FOLDER"/*.mp4 "$PAGE_FOLDER"/*.webm "$PAGE_FOLDER"/*.mkv; do
                [ -f "$FILE" ] || continue
                FILENAME=$(basename "$FILE")
                echo "  📄 Uploading: $FILENAME"
                curl -s -X POST "${BALE_API_URL}/sendVideo" -F "chat_id=${CHANNEL_ID}" \
                  -F "video=@${FILE}" -F "caption=" > /dev/null 2>&1
                echo "    ✅ Uploaded"
                sleep 3
              done
            done
          fi
          echo "✅ All media files uploaded"
