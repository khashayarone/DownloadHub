# ============================================================
# yt-dl.yml — Bale YouTube Downloader V5 (Premium + RAR Split)
# Repository: github.com/khashayardev/DownloadHub
# ============================================================
# Features V5:
#   ۱. 6 bypass methods + Deno JS solver
#   ۲. Two-Layer Cache compatible (notifies bot via /cache)
#   ۳. Full playlist & channel download
#   ۴. Quality mapping: 720→best, 480→480p, audio→MP3
#   ۵. Subtitle download (fa & en)
#   ۶. Premium-aware: >45MB split into .partX.rar for premium users
#   ۷. Free users: >45MB notification with back button
#   ۸. Combined single message (thumbnail + caption + channel + back)
#   ۹. Direct upload via sendVideo/sendAudio/sendDocument
#   ۱۰. /cache notification with multipart support
#   ۱۱. WinRAR split volumes (.part1.rar, .part2.rar, ...)
#   ۱۲. No repo storage — direct upload only
#   ۱۳. Compatible with Bale DownloadHub Bot v6
# ============================================================

name: "🎬 YouTube Downloader V5"

on:
  workflow_dispatch:
    inputs:
      youtube_urls:
        description: "🔗 YouTube URL(s)"
        required: true
        type: string
      quality:
        description: "📹 Quality (720=best, 480=480p, audio=MP3)"
        required: false
        type: choice
        default: "720"
        options:
          - "720"
          - "480"
          - audio
      download_type:
        description: "📋 Download Type"
        required: false
        type: choice
        default: "single"
        options:
          - single
          - playlist
          - all_channel
      max_items:
        description: "🔢 Max Items"
        required: false
        type: string
        default: "10"
      download_subtitles:
        description: "📝 Subtitles (fa & en)"
        required: false
        type: boolean
        default: false
      chat_id:
        description: "🆔 User Chat ID"
        required: false
        type: string
        default: ""
      channel_id:
        description: "📢 Channel ID"
        required: false
        type: string
        default: ""
      channel_username:
        description: "📢 Channel Username"
        required: false
        type: string
        default: ""
      is_premium:
        description: "⭐ Premium user? (true/false)"
        required: false
        type: string
        default: "false"

env:
  PROJECT_NAME: "Khashayar Downloader"
  PROJECT_URL: "https://khashayar.one"
  PLATFORM: "youtube"
  TARGET_SIZE_MB: 45
  TARGET_SIZE_BYTES: 47185920
  ADMIN_CHAT_ID: "241726352"
  MAX_PARTS: 20

jobs:
  download:
    name: "🎬 Download & Upload"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      actions: read

    steps:
      # ── Step 1: Checkout ──────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── Step 2: Git Config ────────────────────────────
      - name: "⚙️ Configure Git"
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Step 3: Cloudflare WARP ───────────────────────
      - name: "🌐 Setup Cloudflare WARP"
        run: |
          docker network create warp-net 2>/dev/null || true
          docker run -d --name warp --restart=no --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp:latest
          sleep 15
          for i in $(seq 1 5); do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then echo "✅ WARP active!"; break; else sleep 5; fi
          done

      # ── Step 4: Dependencies ───────────────────────────
      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip ffmpeg curl jq bc rar
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip3 install --upgrade yt-dlp --quiet

      # ── Step 5: Setup Parameters ──────────────────────
      - name: "🔧 Setup Parameters"
        id: setup
        env:
          YT_URLS: ${{ github.event.inputs.youtube_urls }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_TYPE: ${{ github.event.inputs.download_type }}
          YT_MAX: ${{ github.event.inputs.max_items }}
          YT_SUBS: ${{ github.event.inputs.download_subtitles }}
          YT_PREMIUM: ${{ github.event.inputs.is_premium }}
        run: |
          YT_URLS="${YT_URLS}"
          QUALITY="${YT_QUALITY}"
          DOWNLOAD_TYPE="${YT_TYPE}"
          MAX_ITEMS="${YT_MAX}"
          DOWNLOAD_SUBS="${YT_SUBS}"
          IS_PREMIUM="${YT_PREMIUM}"
          
          echo "════════════════════════════════════════"
          echo "  $PROJECT_NAME | $PROJECT_URL"
          echo "════════════════════════════════════════"
          echo "🎬 URLs: ${YT_URLS}"
          echo "📹 Quality: ${QUALITY} | Type: ${DOWNLOAD_TYPE} | Max: ${MAX_ITEMS}"
          echo "⭐ Premium: ${IS_PREMIUM}"
          
          echo "YT_URLS=${YT_URLS}" >> $GITHUB_ENV
          echo "QUALITY=${QUALITY}" >> $GITHUB_ENV
          echo "DOWNLOAD_TYPE=${DOWNLOAD_TYPE}" >> $GITHUB_ENV
          echo "MAX_ITEMS=${MAX_ITEMS}" >> $GITHUB_ENV
          echo "DOWNLOAD_SUBS=${DOWNLOAD_SUBS}" >> $GITHUB_ENV
          echo "IS_PREMIUM=${IS_PREMIUM}" >> $GITHUB_ENV
          echo "TMP_DIR=/tmp/yt_downloads_$$" >> $GITHUB_ENV
          
          mkdir -p /tmp/yt_downloads_$$
          
          # Quality mapping: 720→best, 480→480p, audio→audio
          case "${QUALITY}" in
            audio) FORMAT="bestaudio/bestaudio*/best" ;;
            720)   FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best" ;;
            480)   FORMAT="bestvideo[height<=480]+bestaudio/bestvideo[height<=480]*+bestaudio*/bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
            *)     FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best" ;;
          esac
          echo "FORMAT=${FORMAT}" >> $GITHUB_ENV
          
          if [ "$DOWNLOAD_TYPE" = "playlist" ] || [ "$DOWNLOAD_TYPE" = "all_channel" ]; then
            PLAYLIST_FLAG="--yes-playlist --playlist-end ${MAX_ITEMS}"
          else
            PLAYLIST_FLAG="--no-playlist"
          fi
          echo "PLAYLIST_FLAG=${PLAYLIST_FLAG}" >> $GITHUB_ENV
          echo "✅ Setup complete"

      # ── Step 6: Download & Process ────────────────────
      - name: "🎬 Download & Process"
        id: download
        env:
          FORMAT: ${{ env.FORMAT }}
          QUALITY: ${{ env.QUALITY }}
          PLAYLIST_FLAG: ${{ env.PLAYLIST_FLAG }}
          YT_URLS: ${{ env.YT_URLS }}
          DOWNLOAD_SUBS: ${{ env.DOWNLOAD_SUBS }}
          IS_PREMIUM: ${{ env.IS_PREMIUM }}
          TMP_DIR: ${{ env.TMP_DIR }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          CHANNEL_ID: ${{ github.event.inputs.channel_id }}
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          #!/bin/bash
          shopt -s nullglob
          set -e
          
          TARGET_SIZE_BYTES=$(( 45 * 1024 * 1024 ))
          BALE_API="https://tapi.bale.ai/bot${BALE_TOKEN}"
          ADMIN_ID="${ADMIN_CHAT_ID}"
          MAX_PARTS="${MAX_PARTS}"
          
          sanitize_name() {
            local name="$1"
            name=$(echo "$name" | sed 's/[()（）]/_/g' | sed 's/[][{}\/\\<>|:;'"'"'"]/_/g')
            name=$(echo "$name" | tr '[:space:]｜　' '-' | tr -c 'a-zA-Z0-9_-' '-' | tr -s '-' | sed 's/^-//;s/-$//')
            [ -z "$name" ] && name="unknown"
            echo "$name"
          }
          
          format_number() {
            local num=$1
            [ -z "$num" ] || [ "$num" = "null" ] && echo "0" && return
            [ "$num" -gt 1000000 ] 2>/dev/null && echo "$(echo "scale=1; $num/1000000" | bc)M" && return
            [ "$num" -gt 1000 ] 2>/dev/null && echo "$(echo "scale=1; $num/1000" | bc)K" && return
            echo "$num"
          }
          
          notify_oversized() {
            local fname="$1" fsize="$2" url="$3"
            local fsize_mb=$(( fsize / 1024 / 1024 ))
            local caption="⚠️ *فایل بیشتر از ۴۵ مگابایت است!*\n\n📁 *نام:* ${fname}\n📦 *حجم:* ${fsize_mb}MB\n🔗 *لینک:* ${url}\n\n❌ امکان دانلود در نسخه رایگان وجود ندارد.\n⭐ با خرید اشتراک پریمیوم محدودیت حجم برداشته میشود."
            local kb='{"inline_keyboard":[[{"text":"🔙 بازگشت به منوی اصلی","callback_data":"back_to_main"}]]}'
            curl -s -X POST "${BALE_API}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":$(echo "$caption" | jq -Rsc '.'),\"parse_mode\":\"Markdown\",\"reply_markup\":${kb}}" > /dev/null 2>&1
            echo "  📤 Sent >45MB notification"
          }
          
          notify_multipart_info() {
            local fname="$1" total_parts="$2" url="$3"
            local caption="📦 *فایل به ${total_parts} پارت ۴۵MB تقسیم شد.*\n\n📁 *نام:* ${fname}\n📥 همه پارت‌ها را دانلود کنید، سپس *پارت ۱* را Extract کنید.\n\n🔗 *لینک:* ${url}"
            local kb='{"inline_keyboard":[[{"text":"🔙 بازگشت به منوی اصلی","callback_data":"back_to_main"}]]}'
            curl -s -X POST "${BALE_API}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":$(echo "$caption" | jq -Rsc '.'),\"parse_mode\":\"Markdown\",\"reply_markup\":${kb}}" > /dev/null 2>&1
            echo "  📤 Sent multipart info"
          }
          
          notify_cache() {
            local platform="$1" url="$2" quality="$3" file_id="$4" channel_id="$5" message_id="$6" file_size="$7" file_name="$8" is_multipart="$9" total_parts="${10}"
            curl -s -X POST "${BALE_API}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${ADMIN_ID}\",\"text\":\"/cache ${platform} ${url} ${quality} ${file_id} ${channel_id} ${message_id} ${file_size} ${file_name} ${is_multipart} ${total_parts}\"}" > /dev/null 2>&1
            echo "  📤 Cache notification sent"
          }
          
          download_video() {
            local METHOD=$1 URL=$2 TMP_DIR=$3
            if [ "$QUALITY" = "audio" ]; then
              COMMON_FLAGS="--extract-audio --audio-format mp3 --audio-quality 0 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            else
              COMMON_FLAGS="--merge-output-format mp4 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            fi
            
            case $METHOD in
              1) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS $PLAYLIST_FLAG --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" "$URL" 2>&1 ;;
              2) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS $PLAYLIST_FLAG --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github "$URL" 2>&1 ;;
              3) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS $PLAYLIST_FLAG --extractor-args "youtube:player_client=mweb" "$URL" 2>&1 ;;
              4) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS $PLAYLIST_FLAG --extractor-args "youtube:player_client=android_vr" "$URL" 2>&1 ;;
              5) yt-dlp --format "$FORMAT" $COMMON_FLAGS $PLAYLIST_FLAG --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github "$URL" 2>&1 ;;
              6) yt-dlp --format "$FORMAT" $COMMON_FLAGS $PLAYLIST_FLAG "$URL" 2>&1 ;;
              *) return 1 ;;
            esac
          }
          
          read -ra URL_ARRAY <<< "$YT_URLS"
          TOTAL_URLS=${#URL_ARRAY[@]}
          
          for YT_URL in "${URL_ARRAY[@]}"; do
          
          # Normalize URL
          if [[ "$YT_URL" =~ youtu\.be/([a-zA-Z0-9_-]+) ]]; then
            YT_URL="https://www.youtube.com/watch?v=${BASH_REMATCH[1]%%\?*}"
          fi
          
          echo "🔍 Fetching metadata: $YT_URL"
          INFO_JSON=$(yt-dlp --proxy "socks5://127.0.0.1:1080" --dump-json --skip-download "$YT_URL" 2>/dev/null || echo "{}")
          
          CREATOR=$(echo "$INFO_JSON" | jq -r '.uploader // .channel // "Unknown"')
          TITLE=$(echo "$INFO_JSON" | jq -r '.title // "Untitled"')
          DURATION=$(echo "$INFO_JSON" | jq -r '.duration // 0')
          VIEW_COUNT=$(echo "$INFO_JSON" | jq -r '.view_count // 0')
          THUMBNAIL_URL=$(echo "$INFO_JSON" | jq -r '.thumbnail // ""')
          
          echo "  👤 $CREATOR | 📝 $TITLE | 👁 $(format_number $VIEW_COUNT)"
          
          TMP_DIR="tmp_yt_$$"
          mkdir -p "$TMP_DIR"
          
          DOWNLOAD_SUCCESS=false
          for METHOD in 1 2 3 4 5 6; do
            if download_video $METHOD "$YT_URL" "$TMP_DIR" | grep -q "100%"; then
              echo "  ✅ Downloaded (method $METHOD)"
              DOWNLOAD_SUCCESS=true; break
            else
              echo "  ❌ Method $METHOD failed"; sleep 2
            fi
          done
          
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "  🚫 All methods failed"
            rm -rf "$TMP_DIR"
            continue
          fi
          
          # Process files
          for MEDIA_FILE in "$TMP_DIR"/*.mp4 "$TMP_DIR"/*.webm "$TMP_DIR"/*.mkv "$TMP_DIR"/*.mp3 "$TMP_DIR"/*.m4a; do
            [ -f "$MEDIA_FILE" ] || continue
            
            BASENAME=$(basename "$MEDIA_FILE")
            SAFE_NAME=$(sanitize_name "${BASENAME%.*}")
            EXT="${BASENAME##*.}"
            FILE_SIZE=$(stat -c%s "$MEDIA_FILE" 2>/dev/null || echo 0)
            
            echo "  📦 ${SAFE_NAME}.${EXT} — $(( FILE_SIZE / 1024 / 1024 ))MB"
            
            # ═══ SIZE CHECK ═══
            if [ "$FILE_SIZE" -gt "$TARGET_SIZE_BYTES" ]; then
              if [ "$IS_PREMIUM" = "true" ]; then
                # ═══ PREMIUM: Split with WinRAR ═══
                echo "  ⭐ Premium user — splitting with RAR..."
                
                SPLIT_DIR="/tmp/rar_split_$$"
                mkdir -p "$SPLIT_DIR"
                
                # Copy file to split directory
                cp "$MEDIA_FILE" "${SPLIT_DIR}/${SAFE_NAME}.${EXT}"
                
                # Create RAR split volumes (45MB each)
                cd "$SPLIT_DIR"
                rar a -v${TARGET_SIZE_MB}m -ep1 -m0 -idq "${SAFE_NAME}.part.rar" "${SAFE_NAME}.${EXT}"
                rm -f "${SAFE_NAME}.${EXT}"  # Remove original, keep only parts
                cd - > /dev/null
                
                # Count parts
                TOTAL_PARTS=$(ls "${SPLIT_DIR}/${SAFE_NAME}.part"*.rar 2>/dev/null | wc -l)
                
                if [ "$TOTAL_PARTS" -gt "$MAX_PARTS" ]; then
                  echo "  ⚠️ Too many parts (${TOTAL_PARTS}) — rejecting"
                  if [ -n "$CHAT_ID" ]; then
                    notify_oversized "${SAFE_NAME}.${EXT}" "$FILE_SIZE" "$YT_URL"
                  fi
                  rm -rf "$SPLIT_DIR"
                  continue
                fi
                
                echo "  📦 Split into ${TOTAL_PARTS} RAR parts"
                
                # Upload all parts as documents
                PART_NUM=0
                FIRST_MESSAGE_ID=0
                FIRST_FILE_ID=""
                
                # Sort parts alphabetically to ensure correct order
                for PART_FILE in $(ls "${SPLIT_DIR}/${SAFE_NAME}.part"*.rar | sort); do
                  [ -f "$PART_FILE" ] || continue
                  PART_NUM=$((PART_NUM + 1))
                  PART_NAME=$(basename "$PART_FILE")
                  
                  echo "  📤 Uploading part ${PART_NUM}/${TOTAL_PARTS}: ${PART_NAME}"
                  
                  UPLOAD_RESPONSE=$(curl -s -X POST "${BALE_API}/sendDocument" \
                    -F "chat_id=${CHANNEL_ID}" \
                    -F "document=@${PART_FILE}" \
                    -F "caption=")
                  
                  MESSAGE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.message_id // 0')
                  FILE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.document.file_id // ""')
                  
                  if [ "$PART_NUM" -eq 1 ]; then
                    FIRST_MESSAGE_ID=$MESSAGE_ID
                    FIRST_FILE_ID=$FILE_ID
                  fi
                  
                  if [ "$MESSAGE_ID" != "0" ]; then
                    echo "    ✅ Part ${PART_NUM} uploaded (msg_id: ${MESSAGE_ID})"
                  else
                    echo "    ❌ Part ${PART_NUM} upload failed"
                  fi
                  sleep 2
                done
                
                # Notify bot to cache (using first part's message_id and file_id)
                if [ -n "$CHAT_ID" ] && [ -n "$FIRST_FILE_ID" ] && [ "$FIRST_MESSAGE_ID" != "0" ]; then
                  notify_cache "youtube" "$YT_URL" "$QUALITY" "$FIRST_FILE_ID" "${CHANNEL_ID}" "$FIRST_MESSAGE_ID" "$FILE_SIZE" "${SAFE_NAME}.${EXT}" "1" "$TOTAL_PARTS"
                fi
                
                # Send multipart info to user
                if [ -n "$CHAT_ID" ]; then
                  notify_multipart_info "${SAFE_NAME}.${EXT}" "$TOTAL_PARTS" "$YT_URL"
                fi
                
                rm -rf "$SPLIT_DIR"
                
              else
                # ═══ FREE: Reject ═══
                echo "  ⚠️ Free user — >45MB rejected"
                if [ -n "$CHAT_ID" ]; then
                  notify_oversized "${SAFE_NAME}.${EXT}" "$FILE_SIZE" "$YT_URL"
                fi
              fi
            else
              # ═══ ≤45MB: Direct upload ═══
              if [ -n "$CHANNEL_ID" ]; then
                if [[ "$EXT" == "mp3" ]] || [[ "$QUALITY" == "audio" ]]; then
                  UPLOAD_RESPONSE=$(curl -s -X POST "${BALE_API}/sendAudio" \
                    -F "chat_id=${CHANNEL_ID}" -F "audio=@${MEDIA_FILE}" -F "caption=")
                  FILE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.audio.file_id // ""')
                else
                  UPLOAD_RESPONSE=$(curl -s -X POST "${BALE_API}/sendVideo" \
                    -F "chat_id=${CHANNEL_ID}" -F "video=@${MEDIA_FILE}" -F "caption=")
                  FILE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.video.file_id // ""')
                fi
                
                MESSAGE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.result.message_id // 0')
                
                if [ -n "$FILE_ID" ] && [ "$MESSAGE_ID" != "0" ]; then
                  echo "  ✅ Uploaded (msg_id: $MESSAGE_ID)"
                  if [ -n "$CHAT_ID" ]; then
                    notify_cache "youtube" "$YT_URL" "$QUALITY" "$FILE_ID" "${CHANNEL_ID}" "$MESSAGE_ID" "$FILE_SIZE" "${SAFE_NAME}.${EXT}" "0" "1"
                  fi
                else
                  echo "  ❌ Upload failed: $UPLOAD_RESPONSE"
                fi
                sleep 2
              fi
            fi
          done
          
          rm -rf "$TMP_DIR"
          
          echo "CREATOR=${CREATOR}" >> $GITHUB_ENV
          echo "TRACK_TITLE=${TITLE}" >> $GITHUB_ENV
          echo "DURATION=${DURATION}" >> $GITHUB_ENV
          echo "THUMBNAIL_URL=${THUMBNAIL_URL}" >> $GITHUB_ENV
          echo "VIEW_COUNT=${VIEW_COUNT}" >> $GITHUB_ENV
          
          done
          
          echo "✅ All URLs processed: ${TOTAL_URLS}"

      # ── Step 7: Stop WARP ─────────────────────────────
      - name: "🛑 Stop WARP"
        if: always()
        run: |
          docker stop warp 2>/dev/null || true
          docker rm warp 2>/dev/null || true

      # ── Step 8: Send Result to User ───────────────────
      - name: "📬 Send Complete Result"
        if: github.event.inputs.chat_id != ''
        env:
          BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          YT_URLS: ${{ env.YT_URLS }}
          CREATOR: ${{ env.CREATOR }}
          TRACK_TITLE: ${{ env.TRACK_TITLE }}
          DURATION: ${{ env.DURATION }}
          VIEW_COUNT: ${{ env.VIEW_COUNT }}
          THUMBNAIL_URL: ${{ env.THUMBNAIL_URL }}
          CHANNEL_ID: ${{ github.event.inputs.channel_id }}
          CHANNEL_USERNAME: ${{ github.event.inputs.channel_username }}
        run: |
          #!/bin/bash
          BALE_API="https://tapi.bale.ai/bot${BALE_TOKEN}"
          CHAT_ID="${CHAT_ID}"
          CREATOR_NAME="${CREATOR:-Unknown}"
          TITLE_NAME="${TRACK_TITLE:-Untitled}"
          THUMB_URL="${THUMBNAIL_URL:-}"
          DURATION_VAL="${DURATION:-0}"
          VIEW_VAL="${VIEW_COUNT:-0}"
          
          # Format duration
          if [ "$DURATION_VAL" -gt 0 ] 2>/dev/null; then
            DUR_FMT="$(( DURATION_VAL / 60 )):$(printf '%02d' $(( DURATION_VAL % 60 )))"
          else
            DUR_FMT="—"
          fi
          
          # Format views
          if [ "$VIEW_VAL" != "0" ] && [ "$VIEW_VAL" != "null" ] && [ "$VIEW_VAL" -gt 0 ] 2>/dev/null; then
            if [ "$VIEW_VAL" -gt 1000000 ]; then VIEWS_FMT="$(echo "scale=1; $VIEW_VAL/1000000" | bc)M"
            elif [ "$VIEW_VAL" -gt 1000 ]; then VIEWS_FMT="$(echo "scale=1; $VIEW_VAL/1000" | bc)K"
            else VIEWS_FMT="$VIEW_VAL"; fi
          else
            VIEWS_FMT="—"
          fi
          
          # Channel link
          if [ -n "$CHANNEL_USERNAME" ]; then
            CHANNEL_LINK="https://ble.ir/${CHANNEL_USERNAME}"
          elif [ -n "$CHANNEL_ID" ]; then
            CHANNEL_LINK="https://ble.ir/im/p/${CHANNEL_ID}"
          else
            CHANNEL_LINK="https://ble.ir"
          fi
          
          CAPTION="🎬 *${TITLE_NAME}*

          👤 *سازنده:* ${CREATOR_NAME}
          ⏱ *مدت:* ${DUR_FMT}  |  👁 *بازدید:* ${VIEWS_FMT}

          ✅ *دانلود کامل شد!*
          📁 فایل در کانال آرشیو شما ذخیره شد.

          🔗 [مشاهده در YouTube](${YT_URLS})"
          
          KEYBOARD='{"inline_keyboard":[[{"text":"📂 دریافت فایل از کانال آرشیو","url":"'"${CHANNEL_LINK}"'"}],[{"text":"🔙 بازگشت به منوی اصلی","callback_data":"back_to_main"}]]}'
          
          ESCAPED_CAPTION=$(echo "$CAPTION" | jq -Rsc '.')
          
          if [ -n "$THUMB_URL" ] && [ "$THUMB_URL" != "null" ]; then
            PHOTO_RESULT=$(curl -s -X POST "${BALE_API}/sendPhoto" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"photo\":\"${THUMB_URL}\",\"caption\":${ESCAPED_CAPTION},\"parse_mode\":\"Markdown\",\"reply_markup\":${KEYBOARD}}")
            
            if ! echo "$PHOTO_RESULT" | jq -e '.ok == true' > /dev/null 2>&1; then
              curl -s -X POST "${BALE_API}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":${ESCAPED_CAPTION},\"parse_mode\":\"Markdown\",\"reply_markup\":${KEYBOARD}}" > /dev/null 2>&1
            fi
          else
            curl -s -X POST "${BALE_API}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":${ESCAPED_CAPTION},\"parse_mode\":\"Markdown\",\"reply_markup\":${KEYBOARD}}" > /dev/null 2>&1
          fi
          
          echo "✅ Result sent to user"
